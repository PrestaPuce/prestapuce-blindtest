<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presta'Puce - Blind Test (v1.100)</title>
    <link rel="icon" id="page-favicon" type="image/png" href="https://static.wixstatic.com/media/eda9e4_e7ab6af2d5a7428f9bc7e4af454e20ef~mv2.png">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #3498db; --bg: #1a1a1a; --card: #2c3e50; --text: #ffffff; --accent: #f1c40f; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 1.2rem; text-align: center; background: #34495e; color: white; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 1.2rem; cursor: pointer; transition: transform 0.2s; font-weight: bold; }
        button:active { transform: scale(0.95); }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        #buzzer-btn { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, #ff5e57, #ff3b30); border: 8px solid #c0392b; box-shadow: 0 10px 20px rgba(0,0,0,0.5); font-size: 2rem; color: white; margin-top: 20px; -webkit-tap-highlight-color: transparent; }
        #buzzer-btn:active { transform: scale(0.95); box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        #buzzer-btn.disabled { background: #555; border-color: #333; cursor: not-allowed; opacity: 0.5; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .avatar-option { font-size: 2rem; cursor: pointer; padding: 10px; background: var(--card); border-radius: 10px; transition: 0.3s; }
        .avatar-option.selected { background: var(--accent); transform: scale(1.1); }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; margin-bottom: 15px; font-weight: bold; }
        .status-wait { background: #f39c12; color: #fff; }
        .status-go { background: #2ecc71; color: #fff; }
        .status-locked { background: #e74c3c; color: #fff; }
        #podium-zone { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .trophy-img { width: 120px; margin-bottom: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        /* Style spécial Banni */
        #banned-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: red; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="screen-login" class="container">
    <img src="https://static.wixstatic.com/media/eda9e4_e7ab6af2d5a7428f9bc7e4af454e20ef~mv2.png" alt="Logo" width="100" style="margin-bottom: 20px;">
    <h2>Rejoindre une salle</h2>
    <input type="text" id="room-code" placeholder="CODE SALLE (ex: A1B2)" style="text-transform:uppercase;">
    <button class="btn-primary" onclick="checkRoom()">Valider</button>
</div>

<div id="screen-profile" class="container hidden">
    <h3>Qui es-tu ?</h3>
    <div class="avatar-grid" id="avatar-list"></div>
    <input type="text" id="pseudo" placeholder="Ton Pseudo" maxlength="12">
    <button class="btn-success" onclick="joinGame()">PRÊT !</button>
    <button onclick="location.reload()" style="background:transparent; color:#999; font-size:0.9rem;">Retour</button>
</div>

<div id="screen-game" class="container hidden">
    <div id="player-header">
        <span id="my-avatar" style="font-size:2rem;"></span>
        <h3 id="my-pseudo" style="margin:5px 0;"></h3>
        <p>Score: <span id="my-score" style="color:var(--accent); font-weight:bold;">0</span></p>
    </div>
    <div id="game-status" class="status-badge status-wait">En attente...</div>
    <button id="buzzer-btn" class="disabled">BUZZ !</button>
    <div id="team-info" style="margin-top:20px; font-size:0.9rem; color:#aaa;"></div>
</div>

<div id="podium-zone">
    <div id="podium-content"></div>
    <button onclick="leaveGame(true)" class="btn-primary" style="width:200px; margin-top:30px;">Quitter</button>
</div>

<div id="banned-screen" class="hidden">
    <h1 style="font-size: 4rem;">🚫</h1>
    <h2>ACCÈS REFUSÉ</h2>
    <p>Vous avez été banni de cette salle par le Maître du Jeu.</p>
</div>

<audio id="sound-buzz" src="https://lasonotheque.org/UPLOAD/mp3/0342.mp3"></audio>
<audio id="sound-applause" src="https://lasonotheque.org/UPLOAD/mp3/0084.mp3"></audio>

<script>
    // Configuration Firebase (Identique à ton projet)
    const firebaseConfig = {
        apiKey: "AIzaSyD...",
        authDomain: "presta-puce.firebaseapp.com",
        databaseURL: "https://presta-puce-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "presta-puce",
        storageBucket: "presta-puce.appspot.com",
        messagingSenderId: "53826...",
        appId: "1:5382..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Variables Globales
    let roomID = "";
    let myUserID = ""; // LE fameux ID unique
    let player = { pseudo: "", avatar: "🐶", score: 0 };
    let roomRef = null;
    let myPlayerRef = null;

    // --- INITIALISATION USER ID ---
    // Cette fonction est la première chose qui tourne
    (function initIdentity() {
        let storedId = localStorage.getItem('buzz_userId');
        if (!storedId) {
            // Création ID unique : timestamp + random
            storedId = 'u_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
            localStorage.setItem('buzz_userId', storedId);
        }
        myUserID = storedId;
        console.log("Mon UserID est :", myUserID);
    })();

    // --- 1. Vérification Salle ---
    function checkRoom() {
        const input = document.getElementById('room-code');
        const code = input.value.trim().toUpperCase();
        if(code.length < 4) return alert("Code trop court !");

        db.ref('activeRooms/' + code).once('value', snapshot => {
            if(snapshot.exists()) {
                roomID = code;
                handleRoomTransition();
            } else {
                alert("Salle introuvable !");
            }
        });
    }

    // Gestion Intelligente du Changement de Salle
    function handleRoomTransition() {
        const lastRoom = localStorage.getItem('buzz_lastRoom');
        
        // Si c'est une NOUVELLE salle
        if (lastRoom !== roomID) {
            // On nettoie les restes de l'ancienne partie, mais ON GARDE LE USER ID
            localStorage.removeItem('buzz_playerData'); // On oublie le pseudo/avatar précédent
            localStorage.setItem('buzz_lastRoom', roomID); // On note la nouvelle salle
            
            // On affiche le profil pour choisir pseudo/avatar
            showScreen('screen-profile');
            generateAvatars();
        } 
        // Si c'est la MÊME salle (refresh ou retour)
        else {
            // On vérifie si on est déjà inscrit dans Firebase
            db.ref(`rooms/${roomID}/players/${myUserID}`).once('value', snap => {
                if (snap.exists()) {
                    // Reconnexion directe (magique)
                    const data = snap.val();
                    if(data.banned) {
                        showBanned();
                    } else {
                        player.pseudo = data.name;
                        player.avatar = data.avatar;
                        setupGameListeners();
                    }
                } else {
                    // On est "connu" du tel, mais pas de la salle (cas MJ a reset), on redemande profil
                    showScreen('screen-profile');
                    generateAvatars();
                }
            });
        }
    }

    // --- 2. Inscription / Join ---
    function generateAvatars() {
        const emojis = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔","🐧","🐦"];
        const list = document.getElementById('avatar-list');
        list.innerHTML = "";
        emojis.forEach(e => {
            const div = document.createElement('div');
            div.className = "avatar-option";
            div.innerText = e;
            div.onclick = () => {
                document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                player.avatar = e;
            };
            list.appendChild(div);
        });
    }

    function joinGame() {
        const pseudoInput = document.getElementById('pseudo').value.trim();
        if(!pseudoInput) return alert("Choisis un pseudo !");
        
        player.pseudo = pseudoInput;
        roomRef = db.ref('rooms/' + roomID);

        // VÉRIFICATION DOUBLON PSEUDO (Important)
        roomRef.child('players').once('value', snapshot => {
            const players = snapshot.val() || {};
            let pseudoTaken = false;

            // On vérifie si un AUTRE ID utilise déjà ce pseudo
            Object.keys(players).forEach(key => {
                if (key !== myUserID && players[key].name && players[key].name.toLowerCase() === player.pseudo.toLowerCase()) {
                    pseudoTaken = true;
                }
            });

            if (pseudoTaken) {
                alert("Ce pseudo est déjà pris dans cette salle !");
            } else {
                // Tout est bon, on inscrit l'ID
                registerPlayerInFirebase();
            }
        });
    }

    function registerPlayerInFirebase() {
        myPlayerRef = db.ref(`rooms/${roomID}/players/${myUserID}`);
        
        const initialData = {
            name: player.pseudo,
            avatar: player.avatar,
            score: 0,
            active: true,
            buzzed: false,
            banned: false,
            teamName: "Solo",
            teamIcon: ""
        };

        myPlayerRef.set(initialData).then(() => {
            // Gestion de la déconnexion
            myPlayerRef.onDisconnect().update({ active: false });
            setupGameListeners();
        });
    }

    // --- 3. Logique de Jeu ---
    function setupGameListeners() {
        showScreen('screen-game');
        document.getElementById('my-pseudo').innerText = player.pseudo;
        document.getElementById('my-avatar').innerText = player.avatar;
        
        // Référence mise à jour
        myPlayerRef = db.ref(`rooms/${roomID}/players/${myUserID}`);
        roomRef = db.ref('rooms/' + roomID);

        // ÉCOUTEUR PRINCIPAL (Données du joueur)
        myPlayerRef.on('value', snapshot => {
            const data = snapshot.val();
            
            // 1. Check Bannissement (Priorité absolue)
            if (!data || data.banned === true) {
                showBanned();
                return;
            }

            // 2. Mise à jour Score
            if(data.score !== undefined) {
                player.score = data.score;
                document.getElementById('my-score').innerText = player.score;
            }

            // 3. Mise à jour équipe
            if(data.teamName && data.teamName !== "Solo") {
                document.getElementById('team-info').innerText = `Équipe : ${data.teamIcon} ${data.teamName}`;
            }
        });

        // ÉCOUTEUR ÉTAT SALLE (Buzzer, Podium)
        roomRef.child('state').on('value', snap => {
            const state = snap.val(); // 'open', 'locked', 'buzzed'
            updateBuzzerUI(state);
        });

        roomRef.child('podium').on('value', snap => {
            if(snap.val() === true) showPodium();
            else document.getElementById('podium-zone').style.display = 'none';
        });

        // Suppression de la salle par le MJ
        db.ref('activeRooms/' + roomID).on('value', snap => {
            if(!snap.exists() && document.getElementById('screen-game').classList.contains('hidden') === false) {
                alert("Le MJ a fermé la salle.");
                leaveGame(true);
            }
        });
    }

    function updateBuzzerUI(state) {
        const btn = document.getElementById('buzzer-btn');
        const status = document.getElementById('game-status');

        // Réinitialiser le style
        btn.className = ""; 
        
        if (state === 'open') {
            btn.innerHTML = "BUZZ !";
            status.innerText = "À TOI DE JOUER !";
            status.className = "status-badge status-go";
            
            // Clic sur le buzzer
            btn.onclick = () => {
                document.getElementById('sound-buzz').play().catch(()=>{});
                // On verrouille localement pour éviter double clic
                btn.className = "disabled";
                
                // On envoie le buzz via l'ID
                roomRef.transaction(roomData => {
                    if (roomData && roomData.state === 'open') {
                        roomData.state = 'locked'; // On verrouille la salle
                        // On note qui a buzzé
                        roomData.buzzer = {
                            id: myUserID,
                            name: player.pseudo,
                            avatar: player.avatar
                        };
                        return roomData;
                    }
                });
                
                // On met à jour son statut perso
                myPlayerRef.update({ buzzed: true });
            };

        } else {
            // Verrouillé ou quelqu'un a buzzé
            btn.className = "disabled";
            btn.onclick = null;
            
            if (state === 'locked') {
                status.innerText = "BUZZER VERROUILLÉ";
                status.className = "status-badge status-locked";
            } else {
                // Cas spécial si besoin d'afficher "Quelqu'un a buzzé"
                // On peut écouter roomRef.child('buzzer') pour savoir qui
            }
        }
    }

    // Affichage Podium
    function showPodium() {
        roomRef.child('players').once('value', snap => {
            const players = snap.val() || {};
            const sorted = Object.values(players).sort((a,b) => b.score - a.score); // Tri par score
            
            // Trouver mon rang
            let rank = 0;
            for(let i=0; i<sorted.length; i++) {
                if(sorted[i].name === player.pseudo) { rank = i + 1; break; }
            }

            let html = "";
            if(rank === 1) html = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png" class="trophy-img"><h1>CHAMPION ! 🏆</h1>`;
            else if(rank === 2) html = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583319.png" class="trophy-img"><h1>VICE-CHAMPION 🥈</h1>`;
            else if(rank === 3) html = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583434.png" class="trophy-img"><h1>3ème PLACE 🥉</h1>`;
            else html = `<h1>${rank}ème PLACE</h1><p>Bien joué !</p>`;

            document.getElementById('podium-content').innerHTML = html;
            document.getElementById('podium-zone').style.display = 'flex';
            document.getElementById('sound-applause').play().catch(()=>{});
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 3000 });
        });
    }

    // Quitter / Banni
    function showBanned() {
        document.getElementById('banned-screen').classList.remove('hidden');
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('screen-profile').classList.add('hidden');
        document.getElementById('screen-login').classList.add('hidden');
    }

    function leaveGame(really = false) {
        if(really) {
            // On se met inactif dans Firebase
            if(myPlayerRef) myPlayerRef.update({ active: false });
            
            // On nettoie le local storage de session (Sauf l'ID !)
            localStorage.removeItem('buzz_lastRoom');
            
            location.reload();
        }
    }

    // Helpers UI
    function showScreen(id) {
        document.querySelectorAll('.container').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
