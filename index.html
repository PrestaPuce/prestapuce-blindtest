<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presta'Puce - Blind Test</title>
    <link rel="icon" id="page-favicon" type="image/png" href="https://static.wixstatic.com/media/eda9e4_e7ab6af2d5a7428f9bc7e4af454e20ef~mv2.png">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #3498db; --bg: #1a1a1a; --card: #2c3e50; --text: #ffffff; --accent: #f1c40f; --success: #27ae60; --danger: #e74c3c; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; width: 100%; position: absolute; top: 0; left: 0; transition: opacity 0.3s ease; }
        .active { display: flex; z-index: 10; }
        input, select { width: 100%; max-width: 300px; padding: 15px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 1.1rem; margin-bottom: 15px; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.2); margin-top: 10px; touch-action: manipulation; }
        button:active { transform: translateY(2px); box-shadow: none; }
        .logo-img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 20px; border-radius: 15px; }
        
        .welcome-list { list-style: none; padding: 0; text-align: left; width: 100%; max-width: 320px; margin: 20px 0; }
        .welcome-list li { display: flex; align-items: center; margin-bottom: 15px; font-size: 1.1rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }
        .welcome-list li span { font-size: 1.5rem; margin-right: 15px; min-width: 40px; text-align: center; }

        /* AJOUT POUR LA VERSION 1.078 : STYLE DE LA GRILLE BLASONS */
        .crest-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; width: 100%; max-width: 350px; max-height: 250px; overflow-y: auto; padding: 5px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .crest-item { width: 100%; aspect-ratio: 1; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; display: flex; align-items: center; justify-content: center; background: white; padding: 2px; box-sizing: border-box; }
        .crest-item img { width: 100%; height: 100%; object-fit: contain; }
        .crest-item.selected { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 10px var(--accent); z-index: 2; }

        #buzzer-btn { width: 220px; height: 220px; border-radius: 50%; border: 8px solid white; background: var(--danger); color: white; font-size: 2.5rem; font-weight: 900; box-shadow: 0 10px 30px rgba(231, 76, 60, 0.6), inset 0 10px 20px rgba(255,255,255,0.3); text-shadow: 2px 2px 0 rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; transition: all 0.1s; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        #buzzer-btn:active { transform: scale(0.92); background: #c0392b; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4); }
        .locked { background: #7f8c8d !important; border-color: #95a5a6 !important; box-shadow: none !important; cursor: not-allowed; opacity: 0.6; transform: scale(0.95); }
        .my-turn { animation: pulse 1s infinite; background: var(--success) !important; box-shadow: 0 0 40px var(--success) !important; border-color: #2ecc71 !important; transform: scale(1.1); }
        @keyframes pulse { 0% { transform: scale(1.05); } 50% { transform: scale(1.15); } 100% { transform: scale(1.05); } }
        
        #podium-zone { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; animation: popIn 0.5s ease; }
        .trophy-img { width: 120px; margin-bottom: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-20px);} 60% {transform: translateY(-10px);} }
        .version-tag { position: fixed; bottom: 5px; right: 10px; opacity: 0.3; font-size: 0.7rem; pointer-events: none; }
        
        .btn-leave { position: absolute; top: 15px; left: 15px; background: transparent; border: 1px solid rgba(255,255,255,0.3); padding: 5px 15px; width: auto; font-size: 0.8rem; margin: 0; }
    </style>
</head>
<body>
    <div class="version-tag">v1.078</div>

    <audio id="sound-applause" src="https://actions.google.com/sounds/v1/crowds/battle_crowd_celebrate_stutter.ogg"></audio>

    <div id="screen-login" class="screen active">
        <img id="login-logo" src="https://static.wixstatic.com/media/eda9e4_e7ab6af2d5a7428f9bc7e4af454e20ef~mv2.png" class="logo-img">
        <h2>Rejoindre la salle</h2>
        <input type="number" id="room-code" placeholder="Code PIN (ex: 1234)" inputmode="numeric" onkeydown="if(event.key==='Enter') verifyRoom()">
        <button onclick="verifyRoom()">ENTRER</button>
        <div id="loader" style="display:none; margin-top:20px; color:var(--accent);">Connexion en cours...</div>
    </div>

    <div id="screen-welcome" class="screen">
        <img id="welcome-logo" src="" class="logo-img">
        <h2>Bienvenue !</h2>
        <ul class="welcome-list">
            <li><span>🔊</span> Montez le son</li>
            <li><span>💡</span> Écran toujours allumé</li>
            <li><span>⚡</span> Soyez le plus rapide</li>
            <li><span>🍺</span> Amusez-vous !</li>
        </ul>
        <input type="text" id="pseudo" placeholder="Votre Pseudo" maxlength="12" onkeydown="if(event.key==='Enter') savePseudo()">
        <button onclick="savePseudo()">C'EST PARTI !</button>
    </div>

    <div id="screen-selfie" class="screen">
        <h2>Votre Avatar</h2>
        <p>Prenez une photo ou choisissez une image</p>
        <div style="position:relative; width:150px; height:150px; margin:20px auto; background:#333; border-radius:50%; overflow:hidden; border:4px solid var(--accent);">
            <img id="selfie-preview" style="width:100%; height:100%; object-fit:cover; display:none;">
            <span id="selfie-placeholder" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-size:3rem;">📷</span>
        </div>
        <input type="file" id="selfie-input" accept="image/*" style="display:none" onchange="previewSelfie(this)">
        <button onclick="document.getElementById('selfie-input').click()" style="background:var(--card); margin-bottom:10px;">📸 Choisir Photo</button>
        <button onclick="validateSelfie()" id="btn-valid-selfie" style="display:none;">VALIDER</button>
        <button onclick="skipSelfie()" style="background:transparent; border:1px solid rgba(255,255,255,0.2); font-size:0.9rem; margin-top:10px;">Passer cette étape</button>
    </div>

    <div id="screen-team" class="screen">
        <h2 style="color:var(--accent);">Votre Camp</h2>
        <button onclick="setTeam('Solo')" style="background:#8e44ad; margin-bottom:20px;">👤 Jouer en Solo</button>
        <div style="width:100%; height:1px; background:rgba(255,255,255,0.2); margin:10px 0;"></div>
        <h3>Ou créer une équipe</h3>
        <input type="text" id="team-name" placeholder="Nom de l'équipe" maxlength="15" oninput="checkTeamValid()" onkeydown="if(event.key==='Enter' && !document.getElementById('btn-create-team').disabled) createTeam()">
        
        <div class="crest-grid" id="crest-list"></div>
        
        <button id="btn-create-team" onclick="createTeam()" disabled style="background:#7f8c8d;">Créer l'équipe</button>
    </div>

    <div id="screen-buzzer" class="screen" style="background:black;">
        <button class="btn-leave" onclick="leaveGame()">✖ Quitter</button>
        <div style="position:absolute; top:20px; width:100%; text-align:center;">
            <div id="buzzer-status" style="color:#aaa; font-weight:bold; letter-spacing:1px; margin-bottom:5px;">EN ATTENTE...</div>
            <div id="my-score" style="font-size:1.5rem; color:white;">0 pts</div>
        </div>
        <div id="buzzer-btn" class="locked" ontouchstart="buzz(event)" onmousedown="buzz(event)">BUZZ !</div>
        <div id="my-identity" style="position:absolute; bottom:20px; display:flex; flex-direction:column; align-items:center; opacity:0.7;">
            <img id="my-avatar-display" style="width:50px; height:50px; border-radius:50%; border:2px solid white; margin-bottom:5px;">
            <span id="my-pseudo-display" style="font-weight:bold;"></span>
        </div>
    </div>

    <div id="podium-zone">
        <div id="podium-content"></div>
        <button onclick="location.reload()" style="margin-top:30px; width:auto;">Quitter</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAf1Vl_O8SHJeFjHavKBJgUFGGy73I8t-o", authDomain: "prestapuce-buzz.firebaseapp.com", databaseURL: "https://prestapuce-buzz-default-rtdb.europe-west1.firebasedatabase.app", projectId: "prestapuce-buzz", storageBucket: "prestapuce-buzz.firebasestorage.app", messagingSenderId: "907270883505", appId: "1:907270883505:web:197efec0b99db28180ba90" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let roomID = "", player = { pseudo: "", avatar: "", teamName: "Solo", teamIcon: "" };
        let roomRef = null;
        let selectedCrest = "";
        
        // MODIFICATION : Variables pour les messages de fin
        let mjName = "l'Animateur";
        let mjLink = "";

        // --- 1. INITIALISATION (STRICTEMENT 1.074) ---
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if(params.has('c')) {
                document.getElementById('room-code').value = params.get('c');
                verifyRoom(); // Ceci fonctionnait en 1.074, je le laisse tel quel
            }
        };

        function verifyRoom() {
            const code = document.getElementById('room-code').value.trim();
            if(!code) return alert("Code requis");
            document.getElementById('loader').style.display = 'block';
            
            db.ref('activeRooms/' + code).once('value').then(snap => {
                if(snap.exists()) {
                    roomID = code;
                    roomRef = db.ref('roomsData/' + roomID);
                    
                    // MODIFICATION : On récupère les infos du MJ pour plus tard
                    roomRef.child('mjName').once('value', s => { if(s.exists()) mjName = s.val(); });
                    roomRef.child('mjLink').once('value', s => { if(s.exists()) mjLink = s.val(); });
                    
                    roomRef.child('mjLogo').once('value', s => { 
                        if(s.exists()) document.getElementById('welcome-logo').src = s.val(); 
                    });

                    showScreen('screen-welcome');
                } else {
                    alert("Salle introuvable !");
                    document.getElementById('loader').style.display = 'none';
                }
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- 2. PSEUDO ---
        function savePseudo() {
            const p = document.getElementById('pseudo').value.trim();
            if(!p) return alert("Choisis un pseudo !");
            player.pseudo = p;
            
            roomRef.child('scores').once('value', snap => {
                if(snap.hasChild(p)) {
                    alert("Ce pseudo est déjà pris !");
                } else {
                    showScreen('screen-selfie');
                }
            });
        }

        // --- 3. SELFIE ---
        function previewSelfie(input) {
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('selfie-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('selfie-placeholder').style.display = 'none';
                    document.getElementById('btn-valid-selfie').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function validateSelfie() {
            const img = document.getElementById('selfie-preview').src;
            compressImage(img, 0.5, 300).then(compressed => {
                player.avatar = compressed;
                showScreen('screen-team');
                loadCrests(); // MODIFICATION : Charge la nouvelle grille
            });
        }

        function skipSelfie() {
            player.avatar = "👤";
            showScreen('screen-team');
            loadCrests(); // MODIFICATION : Charge la nouvelle grille
        }

        function compressImage(src, quality, maxWidth) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const scale = maxWidth / img.width;
                    canvas.width = maxWidth;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
            });
        }

        // --- 4. EQUIPE & BLASONS (MODIFIÉ : Générateur SVG + Grille Intelligente) ---
        function createBlason(i) {
            const colors = ['#e74c3c', '#3498db', '#f1c40f', '#2c3e50', '#27ae60', '#ecf0f1'];
            const c1 = colors[i % colors.length]; const c2 = colors[(i+1) % colors.length];
            let pattern = ""; const mod = i % 10;
            if(mod === 0) pattern = `<rect width="100" height="100" fill="${c1}"/><rect x="40" width="20" height="100" fill="${c2}"/><rect y="40" width="100" height="20" fill="${c2}"/>`;
            else if(mod === 1) pattern = `<rect width="100" height="100" fill="${c1}"/><path d="M0 0 L100 100 M100 0 L0 100" stroke="${c2}" stroke-width="20"/>`;
            else if(mod === 2) pattern = `<rect width="100" height="100" fill="${c1}"/><path d="M0 0 L100 100 L0 100 Z" fill="${c2}"/>`;
            else if(mod === 3) pattern = `<rect width="100" height="100" fill="${c1}"/><rect x="33" width="33" height="100" fill="${c2}"/>`;
            else if(mod === 4) pattern = `<rect width="100" height="100" fill="${c1}"/><rect y="33" width="100" height="33" fill="${c2}"/>`;
            else if(mod === 5) pattern = `<rect width="100" height="100" fill="${c1}"/><rect x="0" y="0" width="50" height="50" fill="${c2}"/><rect x="50" y="50" width="50" height="50" fill="${c2}"/>`;
            else if(mod === 6) pattern = `<rect width="100" height="100" fill="${c1}"/><path d="M0 100 L50 0 L100 100 Z" fill="${c2}"/>`;
            else if(mod === 7) pattern = `<rect width="100" height="100" fill="${c1}"/><circle cx="50" cy="50" r="30" fill="${c2}"/>`;
            else if(mod === 8) pattern = `<rect width="100" height="100" fill="${c1}"/><path d="M0 0 L50 50 L0 100 L50 50 L100 0" stroke="${c2}" stroke-width="10"/>`;
            else pattern = `<rect width="100" height="100" fill="${c1}"/><path d="M0 50 L50 0 L100 50 L50 100 Z" fill="${c2}"/>`;
            return `data:image/svg+xml;base64,${btoa(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><clipPath id="shield"><path d="M10 0 H90 V40 C90 80 50 100 50 100 C50 100 10 80 10 40 Z"/></clipPath></defs><g clip-path="url(#shield)">${pattern}</g><path d="M10 0 H90 V40 C90 80 50 100 50 100 C50 100 10 80 10 40 Z" fill="none" stroke="#000" stroke-width="2"/></svg>`)}`;
        }

        function loadCrests() {
            const list = document.getElementById('crest-list');
            list.innerHTML = "";
            
            // 1. Lire la config MJ (Masquer défauts ?)
            roomRef.child('config/showDefaults').once('value').then(snapConf => {
                const showDefaults = (snapConf.val() === false) ? false : true;

                // 2. Lire les équipes existantes (Logos photos)
                roomRef.child('teams').once('value').then(snapTeams => {
                    const teams = snapTeams.val() || {};
                    const usedIcons = new Set();

                    // Afficher les logos personnalisés des autres
                    Object.values(teams).forEach(t => {
                        if(t.icon && !t.icon.startsWith('data:image/svg')) {
                            if(!usedIcons.has(t.icon)) {
                                addCrestItem(t.icon, list);
                                usedIcons.add(t.icon);
                            }
                        }
                    });

                    // 3. Afficher les défauts (si autorisé)
                    if(showDefaults) {
                        for(let i=0; i<30; i++) {
                            addCrestItem(createBlason(i), list);
                        }
                    }
                });
            });
        }

        function addCrestItem(url, container) {
            const div = document.createElement('div');
            div.className = 'crest-item';
            div.innerHTML = `<img src="${url}">`;
            div.onclick = () => {
                document.querySelectorAll('.crest-item').forEach(e => e.classList.remove('selected'));
                div.classList.add('selected');
                selectedCrest = url;
                checkTeamValid();
            };
            container.appendChild(div);
        }

        function checkTeamValid() {
            const n = document.getElementById('team-name').value.trim();
            document.getElementById('btn-create-team').disabled = !(n.length > 0 && selectedCrest !== "");
            // Petit hack visuel pour le bouton grisé
            if(document.getElementById('btn-create-team').disabled === false) {
                document.getElementById('btn-create-team').style.background = "#2ecc71";
            } else {
                document.getElementById('btn-create-team').style.background = "#7f8c8d";
            }
        }

        function createTeam() {
            const n = document.getElementById('team-name').value.trim();
            if(!n || !selectedCrest) return;
            roomRef.child('teams/' + n).set({ icon: selectedCrest });
            setTeam(n, selectedCrest);
        }

        function setTeam(name, icon = "") {
            player.teamName = name;
            player.teamIcon = icon;
            startGame();
        }

        // --- 5. JEU & BUZZER ---
        function startGame() {
            roomRef.child('scores/' + player.pseudo).set({
                avatar: player.avatar,
                teamName: player.teamName,
                teamIcon: player.teamIcon,
                pts: 0,
                active: true
            });

            document.getElementById('my-avatar-display').src = player.avatar.startsWith('data') ? player.avatar : (player.teamIcon || 'https://via.placeholder.com/50');
            document.getElementById('my-pseudo-display').innerText = player.pseudo + (player.teamName !== "Solo" ? " (" + player.teamName + ")" : "");
            
            showScreen('screen-buzzer');
            listenGame();
        }

        function listenGame() {
            roomRef.child('gameState').on('value', snap => {
                const s = snap.val() ? snap.val().status : 'waiting';
                const btn = document.getElementById('buzzer-btn');
                const lbl = document.getElementById('buzzer-status');

                if(s === 'ready') {
                    btn.classList.remove('locked', 'my-turn');
                    btn.style.background = "#27ae60"; 
                    btn.innerText = "BUZZ !";
                    lbl.innerText = "À VOUS !";
                    lbl.style.color = "#2ecc71";
                    if(navigator.vibrate) navigator.vibrate(50);
                } else if(s === 'taken') {
                    btn.classList.add('locked');
                    btn.style.background = "#e74c3c";
                    btn.innerText = "TROP TARD";
                    lbl.innerText = "BLOQUÉ";
                    lbl.style.color = "#e74c3c";
                } else if(s === 'endGame') {
                    showPodium();
                } else {
                    btn.classList.add('locked');
                    btn.style.background = "#95a5a6";
                    btn.innerText = "ATTENTE";
                    lbl.innerText = "PAUSE";
                    lbl.style.color = "#95a5a6";
                }
            });

            roomRef.child('buzzers').on('value', snap => {
                const val = snap.val();
                if(val && val.pseudo === player.pseudo) {
                    const btn = document.getElementById('buzzer-btn');
                    btn.classList.remove('locked');
                    btn.classList.add('my-turn');
                    btn.innerText = "C'EST TOI !";
                    document.getElementById('buzzer-status').innerText = "RÉPONDS !";
                    if(navigator.vibrate) navigator.vibrate([100,50,100]);
                }
            });

            roomRef.child('scores/' + player.pseudo + '/pts').on('value', snap => {
                document.getElementById('my-score').innerText = (snap.val() || 0) + " pts";
            });

            // MODIFICATION : GESTION DES MESSAGES DE FIN INTELLIGENTS
            roomRef.on('value', snap => {
                if(!snap.exists()) {
                    // Salle supprimée -> Clôture
                    handleExit("🛑 La partie a été clôturée par " + mjName + ".", true);
                }
            });

            roomRef.child('scores/' + player.pseudo).on('value', snap => {
                if(snap.exists() && snap.val().kicked === true) {
                    // Joueur kické
                    handleExit("🚫 Vous avez été exclu de la partie.", false);
                }
            });
        }

        // MODIFICATION : FONCTION DE SORTIE UNIFIEE
        function handleExit(message, redirect) {
            // Coupe les écoutes
            if(roomRef) roomRef.off();
            
            alert(message);
            
            // Redirection intelligente
            if(redirect && mjLink && mjLink.startsWith('http')) {
                window.location.href = mjLink;
            } else {
                location.reload(); // Retour accueil
            }
        }

        function buzz(e) {
            e.preventDefault();
            const btn = document.getElementById('buzzer-btn');
            if(btn.classList.contains('locked')) return;
            
            roomRef.child('gameState/status').transaction(currentStatus => {
                if (currentStatus === 'ready') return 'taken';
                return; 
            }, (error, committed) => {
                if (committed) {
                    roomRef.child('buzzers').set({
                        pseudo: player.pseudo,
                        avatar: player.avatar,
                        teamName: player.teamName,
                        teamIcon: player.teamIcon
                    });
                }
            });
        }

        function leaveGame(really = false) {
            if(really) {
                if(roomRef) roomRef.child('scores/'+player.pseudo).update({active:false});
                location.reload();
            } else if(confirm("Quitter la partie ?")) leaveGame(true);
        }

        function showPodium() {
            db.ref('roomsData/'+roomID+'/scores').once('value', snap => {
                const scores = [];
                snap.forEach(c => scores.push({ p: c.key, pts: c.val().pts || 0 }));
                scores.sort((a,b) => b.pts - a.pts);
                
                const rank = scores.findIndex(x => x.p === player.pseudo) + 1;
                let html = "";
                if(rank === 1) html = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png" class="trophy-img"><h1>CHAMPION ! 🏆</h1>`;
                else if(rank === 2) html = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583319.png" class="trophy-img"><h1>VICE-CHAMPION 🥈</h1>`;
                else if(rank === 3) html = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583434.png" class="trophy-img"><h1>3ème PLACE 🥉</h1>`;
                else html = `<h1>${rank}ème PLACE</h1><p>Bien joué !</p>`;
                
                document.getElementById('podium-content').innerHTML = html;
                document.getElementById('podium-zone').style.display = 'flex';
                document.getElementById('sound-applause').play().catch(()=>{});
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 6000 });
            });
        }
    </script>
</body>
</html>
