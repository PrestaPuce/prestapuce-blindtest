<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buzzer - Presta'Puce</title>
    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/eda9e4_e7ab6af2d5a7428f9bc7e4af454e20ef~mv2.png">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg-color: #121212; --buzzer-color: #e74c3c; --buzzer-active: #c0392b; --text: #ffffff; --success: #2ecc71; --locked: #7f8c8d; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-color); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        
        /* CONTENEUR LOGIN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; }
        input, select { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 1.1rem; text-align: center; }
        button#btn-join { background: var(--success); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); }

        /* BUZZER SCREEN */
        #buzzer-screen { display: none; flex-direction: column; height: 100%; }
        
        .header-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); }
        .player-tag { font-weight: bold; color: #f1c40f; font-size: 1.2rem; }
        .score-tag { font-size: 1.5rem; font-weight: 900; }

        .buzzer-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        
        /* LE BOUTON BUZZER */
        #the-buzzer {
            width: 280px; height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
            box-shadow: 0 10px 0 #96281b, 0 20px 40px rgba(0,0,0,0.5), inset 0 5px 20px rgba(255,255,255,0.3);
            border: 8px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; text-transform: uppercase; text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        #the-buzzer:active { transform: translateY(10px) scale(0.98); box-shadow: 0 0 0 #96281b, 0 5px 20px rgba(0,0,0,0.5); }
        
        /* ETATS SPECIAUX */
        .state-locked #the-buzzer { background: var(--locked); box-shadow: 0 10px 0 #555; cursor: not-allowed; transform: scale(0.9); opacity: 0.7; pointer-events: none; }
        .state-winner #the-buzzer { background: radial-gradient(circle, #2ecc71, #27ae60); box-shadow: 0 0 50px #2ecc71; transform: scale(1.1); animation: pulse 1s infinite; pointer-events: none; }
        .state-blocked-mj #the-buzzer { background: #333; color: #777; border-color: #555; box-shadow: none; cursor: default; }

        @keyframes pulse { 0% { transform: scale(1.1); } 50% { transform: scale(1.15); } 100% { transform: scale(1.1); } }

        /* MESSAGE D'ÉTAT */
        #status-msg { position: absolute; bottom: 10%; width: 100%; text-align: center; font-size: 1.5rem; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 2px 10px black; pointer-events: none; }

        /* VERSION TAG */
        .version-tag { position: fixed; bottom: 5px; right: 5px; font-size: 0.6rem; color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="version-tag">v1.048</div>

    <div id="login-screen">
        <h1 style="color:#f1c40f; font-size: 3rem; margin-bottom: 20px;">BUZZER</h1>
        <input type="text" id="pseudo-input" placeholder="Ton Pseudo" maxlength="12">
        
        <select id="team-select">
            <option value="Solo">Jouer en Solo</option>
            <option value="Bleu">Équipe Bleue 🔵</option>
            <option value="Rouge">Équipe Rouge 🔴</option>
            <option value="Jaune">Équipe Jaune 🟡</option>
            <option value="Vert">Équipe Verte 🟢</option>
        </select>
        
        <div style="display:flex; gap:10px; justify-content:center; margin-top:10px;">
            <div onclick="selectAvatar('👤')" style="cursor:pointer; font-size:2rem; padding:10px; background:rgba(255,255,255,0.1); border-radius:10px;">👤</div>
            <div onclick="selectAvatar('🐱')" style="cursor:pointer; font-size:2rem; padding:10px; background:rgba(255,255,255,0.1); border-radius:10px;">🐱</div>
            <div onclick="selectAvatar('🚀')" style="cursor:pointer; font-size:2rem; padding:10px; background:rgba(255,255,255,0.1); border-radius:10px;">🚀</div>
            <div onclick="selectAvatar('💀')" style="cursor:pointer; font-size:2rem; padding:10px; background:rgba(255,255,255,0.1); border-radius:10px;">💀</div>
        </div>
        
        <button id="btn-join" onclick="joinRoom()">REJOINDRE</button>
    </div>

    <div id="buzzer-screen">
        <div class="header-info">
            <div class="player-tag" id="display-pseudo">Joueur</div>
            <div class="score-tag" id="display-score">0</div>
        </div>
        
        <div class="buzzer-container" id="buzzer-container">
            <div id="the-buzzer" onmousedown="triggerBuzzer()" ontouchstart="triggerBuzzer()">BUZZ !</div>
            <div id="status-msg">PRÊT</div>
        </div>
    </div>

    <audio id="sound-buzz" src="https://assets.mixkit.co/active_storage/sfx/2573/2573-preview.mp3"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAf1Vl_O8SHJeFjHavKBJgUFGGy73I8t-o",
            authDomain: "prestapuce-buzz.firebaseapp.com",
            databaseURL: "https://prestapuce-buzz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "prestapuce-buzz",
            storageBucket: "prestapuce-buzz.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Récupération Room ID
        const urlParams = new URLSearchParams(window.location.search);
        let roomID = urlParams.get('room');
        if (!roomID) {
            roomID = prompt("Code de la salle (ex: TEST) :");
            if (roomID) window.location.search = "?room=" + roomID.toUpperCase();
        } else {
            roomID = roomID.toUpperCase();
        }

        let player = { pseudo: "", team: "Solo", avatar: "👤", pts: 0 };
        let roomRef = db.ref('roomsData/' + roomID);
        let isBlocked = false; // Bloqué par le MJ (mauvaise réponse)

        // --- CHOIX AVATAR ---
        function selectAvatar(av) { player.avatar = av; alert("Avatar choisi : " + av); }

        // --- REJOINDRE ---
        function joinRoom() {
            const pseudoInput = document.getElementById('pseudo-input').value.trim();
            if (!pseudoInput) return alert("Choisis un pseudo !");
            
            player.pseudo = pseudoInput;
            player.team = document.getElementById('team-select').value;

            // Vérif doublon simple (pas parfait mais aide)
            roomRef.child('scores/' + player.pseudo).once('value', snapshot => {
                if (snapshot.exists()) {
                    if(!confirm("Ce pseudo existe déjà. Est-ce toi ?")) return;
                }
                
                // Enregistrement initial
                roomRef.child('scores/' + player.pseudo).update({
                    pts: 0,
                    teamName: player.team,
                    avatar: player.avatar,
                    active: true
                });

                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('buzzer-screen').style.display = 'flex';
                document.getElementById('display-pseudo').innerText = player.pseudo;
                
                initGameListeners();
            });
        }

        // --- ECOUTEURS DE JEU ---
        function initGameListeners() {
            // 1. Écoute de mon score personnel
            roomRef.child('scores/' + player.pseudo).on('value', snap => {
                const data = snap.val();
                if(data) document.getElementById('display-score').innerText = data.pts || 0;
            });

            // 2. Écoute de l'état du Buzzer (Qui a buzzé ?)
            roomRef.child('buzzers').on('value', snap => {
                const buzzData = snap.val();
                const container = document.getElementById('buzzer-container');
                const btn = document.getElementById('the-buzzer');
                const msg = document.getElementById('status-msg');

                // Si je suis bloqué par le MJ, je ne fais rien d'autre
                if(isBlocked) return;

                if (buzzData) {
                    // QUELQU'UN A BUZZÉ
                    if (buzzData.pseudo === player.pseudo) {
                        // C'est MOI !
                        container.className = "buzzer-container state-winner";
                        btn.innerText = "GAGNÉ !";
                        msg.innerText = "TU AS LA MAIN";
                        // Vibration (Mobile)
                        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    } else {
                        // C'est un AUTRE
                        container.className = "buzzer-container state-locked";
                        btn.innerText = "BLOQUÉ";
                        msg.innerText = buzzData.pseudo + " A BUZZÉ";
                    }
                } else {
                    // PERSONNE (Reset)
                    container.className = "buzzer-container";
                    btn.innerText = "BUZZ !";
                    msg.innerText = "À TOI DE JOUER";
                }
            });

            // 3. Écoute des blocages (Joueurs exclus de la manche)
            roomRef.child('blockedPlayers').on('value', snap => {
                const blockedList = snap.val() || {};
                const container = document.getElementById('buzzer-container');
                const btn = document.getElementById('the-buzzer');
                const msg = document.getElementById('status-msg');

                if (blockedList[player.pseudo]) {
                    isBlocked = true;
                    container.className = "buzzer-container state-blocked-mj";
                    btn.innerText = "X";
                    msg.innerText = "MANCHE PERDUE";
                } else {
                    isBlocked = false;
                    // L'état sera mis à jour par le listener 'buzzers' juste au-dessus
                }
            });
        }

        // --- ACTION DE BUZZER (TRANSACTION) ---
        function triggerBuzzer() {
            if(isBlocked) return;

            const buzzRef = roomRef.child('buzzers');

            // TRANSACTION : Le cœur du système anti-collision
            buzzRef.transaction(function(currentData) {
                // Si 'currentData' est null, la place est libre
                if (currentData === null) {
                    return {
                        pseudo: player.pseudo,
                        teamName: player.team,
                        avatar: player.avatar,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    };
                } else {
                    // Sinon, quelqu'un a déjà pris la place. On annule (return undefined).
                    return; 
                }
            }, function(error, committed, snapshot) {
                if (error) {
                    console.error('Transaction failed abnormally!', error);
                } else if (!committed) {
                    console.log('Trop tard ! Quelqu\'un a buzzé avant.');
                    // Pas besoin de mettre à jour l'UI ici, le listener .on('buzzers') le fera
                } else {
                    console.log('Victoire ! J\'ai buzzé le premier.');
                    // Jouer le son localement pour un feedback immédiat
                    document.getElementById('sound-buzz').play().catch(()=>{});
                }
            });
        }

        // Empêcher le zoom double-tap sur mobile
        document.addEventListener('dblclick', function(event) {
            event.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
