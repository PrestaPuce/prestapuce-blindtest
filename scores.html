<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau des Scores - Presta'Puce</title>
    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/eda9e4_e7ab6af2d5a7428f9bc7e4af454e20ef~mv2.png">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --accent: #f1c40f; --text: #ffffff; --team-bg: rgba(255,255,255,0.05); }
        body, html { margin: 0; padding: 0; height: 100%; background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* HEADER */
        header { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--accent); position: relative; z-index: 10; }
        .logo-mj { height: 60px; border-radius: 10px; }
        .room-tag { background: var(--accent); color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 1.2rem; }

        /* BOUTON PLEIN ÉCRAN */
        #btn-fullscreen {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px; border-radius: 50%; cursor: pointer;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            transition: all 0.5s ease; opacity: 0.8;
        }
        #btn-fullscreen:hover { opacity: 1; background: var(--accent); color: black; transform: scale(1.1); }
        #btn-fullscreen svg { width: 24px; height: 24px; fill: currentColor; }
        .hide-ui { opacity: 0 !important; pointer-events: none; }

        /* GRILLE DES SCORES */
        .scores-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; max-height: calc(100vh - 100px); overflow-y: auto; z-index: 5; position: relative; }
        
        .score-card { background: var(--card-bg); border-radius: 15px; padding: 15px; display: flex; align-items: center; border-left: 5px solid var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.3s; position: relative; overflow: hidden; }
        .score-card.active-buzz { border-color: #2ecc71; background: #27ae60; transform: scale(1.05); z-index: 10; }
        
        .player-avatar { width: 60px; height: 60px; border-radius: 50%; background: #333; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; overflow: hidden; border: 2px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .player-info { flex-grow: 1; overflow: hidden; }
        .player-name { font-size: 1.4rem; font-weight: bold; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-team { font-size: 0.9rem; color: var(--accent); font-style: italic; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
        .team-icon-mini { height: 18px; width: 18px; object-fit: contain; background: white; padding: 1px; border-radius: 3px; }

        .points { font-size: 2.5rem; font-weight: 900; color: var(--accent); margin-left: 10px; }
        .active-buzz .points { color: white; }

        /* PODIUM FINAL */
        #podium { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .podium-title { font-size: 4rem; color: var(--accent); text-transform: uppercase; margin-bottom: 50px; text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .winners-row { display: flex; align-items: flex-end; gap: 20px; }
        .place { display: flex; flex-direction: column; align-items: center; padding: 20px; border-radius: 15px 15px 0 0; width: 200px; color: #2c3e50; font-weight: bold; }
        .place-2 { background: #bdc3c7; height: 250px; order: 1; border: 2px solid white; }
        .place-1 { background: #f1c40f; height: 350px; order: 2; transform: scale(1.1); box-shadow: 0 0 50px rgba(241, 196, 15, 0.4); border: 2px solid white; z-index: 2; }
        .place-3 { background: #cd7f32; height: 200px; order: 3; color: white; border: 2px solid white; }
        .place-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; margin-bottom: 10px; background: #333; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .place-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .place-name { font-size: 1.2rem; margin-bottom: 5px; }
        .place-pts { font-size: 1.8rem; font-weight: 900; }

        /* VERSION TAG : POSITION FIXE EN HAUT A GAUCHE */
        .version-tag { position: fixed; top: 5px; left: 5px; color: rgba(255,255,255,0.2); font-size: 0.8rem; font-family: monospace; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <div class="version-tag">v1.036</div>

    <button id="btn-fullscreen" onclick="toggleFullScreen()" title="Plein Écran (Touche F)">
        <svg id="icon-fs" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>

    <header>
        <img id="mj-logo" src="https://static.wixstatic.com/media/eda9e4_e7ab6af2d5a7428f9bc7e4af454e20ef~mv2.png" class="logo-mj">
        <div id="room-display" class="room-tag">SALLE : ----</div>
    </header>

    <div id="scores-grid" class="scores-container">
        </div>

    <div id="podium">
        <h1 class="podium-title">🏆 PODIUM FINAL 🏆</h1>
        <div class="winners-row" id="winners-list"></div>
    </div>

    <audio id="sound-applause" src="https://firebasestorage.googleapis.com/v0/b/prestapuce-buzz.firebasestorage.app/o/Bruitage%20-%20Ambiance%20Et%20Applaudissement.mp3?alt=media&token=4a653c7f-67c2-4cc8-b53c-c58c2dda3bbd"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAf1Vl_O8SHJeFjHavKBJgUFGGy73I8t-o",
            authDomain: "prestapuce-buzz.firebaseapp.com",
            databaseURL: "https://prestapuce-buzz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "prestapuce-buzz",
            storageBucket: "prestapuce-buzz.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const roomID = urlParams.get('room');
        let roomRef = null;

        if(!roomID) {
            document.body.innerHTML = "<h1 style='text-align:center; margin-top:100px; color:white;'>Erreur : Aucun code salle détecté.</h1>";
        } else {
            roomRef = db.ref('roomsData/' + roomID);
            document.getElementById('room-display').innerText = "SALLE : " + roomID;
            initScores();
        }

        // --- GESTION PLEIN ÉCRAN ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => { console.log(err); });
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        document.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'f') toggleFullScreen();
        });

        document.addEventListener('fullscreenchange', () => {
            const icon = document.getElementById('icon-fs');
            if (document.fullscreenElement) {
                // Icone Réduire
                icon.innerHTML = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';
            } else {
                // Icone Agrandir
                icon.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
            }
        });

        // Auto-Hide du bouton
        let uiTimer;
        document.onmousemove = () => {
            document.getElementById('btn-fullscreen').classList.remove('hide-ui');
            clearTimeout(uiTimer);
            uiTimer = setTimeout(() => {
                if(document.fullscreenElement) document.getElementById('btn-fullscreen').classList.add('hide-ui');
            }, 3000);
        };

        // --- LOGIQUE SCORES ---
        function initScores() {
            roomRef.child('mjLogo').on('value', snap => {
                if(snap.val()) document.getElementById('mj-logo').src = snap.val();
            });

            roomRef.on('value', snap => {
                const data = snap.val();
                if(!data) return;

                const scores = data.scores || {};
                const buzzers = data.buzzers || null;
                const gameState = data.gameState || { status: 'waiting' };

                if(gameState.status === 'endGame') {
                    if(document.getElementById('podium').style.display !== "flex") {
                        showPodium(scores);
                    }
                } else {
                    document.getElementById('podium').style.display = "none";
                    renderScores(scores, buzzers);
                }
            });
        }

        function renderScores(scores, activeBuzzer) {
            const grid = document.getElementById('scores-grid');
            grid.innerHTML = "";

            const sorted = Object.keys(scores)
                .map(key => ({ name: key, ...scores[key] }))
                .filter(p => p.kicked !== true && p.active !== false) // Filtre bannis et inactifs
                .sort((a, b) => b.pts - a.pts);

            sorted.forEach(player => {
                const isBuzzing = activeBuzzer && activeBuzzer.pseudo === player.name;
                const card = document.createElement('div');
                card.className = `score-card ${isBuzzing ? 'active-buzz' : ''}`;
                
                let avatarHtml = player.avatar && player.avatar.length > 20 
                    ? `<img src="${player.avatar}">` 
                    : player.avatar || '👤';

                let teamHtml = "";
                if(player.teamName && player.teamName !== "Solo") {
                    const icon = player.teamIcon ? `<img src="${player.teamIcon}" class="team-icon-mini">` : "";
                    teamHtml = `<div class="player-team">${icon} ${player.teamName}</div>`;
                }

                card.innerHTML = `
                    <div class="player-avatar">${avatarHtml}</div>
                    <div class="player-info">
                        <p class="player-name">${player.name}</p>
                        ${teamHtml}
                    </div>
                    <div class="points">${player.pts || 0}</div>
                `;
                grid.appendChild(card);
            });
        }

        function showPodium(scores) {
            const podium = document.getElementById('podium');
            const list = document.getElementById('winners-list');
            podium.style.display = "flex";
            list.innerHTML = "";
            
            // Son d'applaudissements
            document.getElementById('sound-applause').play().catch(()=>{});
            
            // Confetti
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 4000 };

            const randomInRange = (min, max) => Math.random() * (max - min) + min;

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            const winners = Object.keys(scores)
                .map(key => ({ name: key, ...scores[key] }))
                .filter(p => p.active !== false)
                .sort((a, b) => b.pts - a.pts)
                .slice(0, 3);

            const places = [
                { class: 'place-2', idx: 1 },
                { class: 'place-1', idx: 0 },
                { class: 'place-3', idx: 2 }
            ];

            places.forEach(p => {
                if(winners[p.idx]) {
                    const w = winners[p.idx];
                    const div = document.createElement('div');
                    div.className = `place ${p.class}`;
                    let av = w.avatar && w.avatar.length > 20 ? `<img src="${w.avatar}">` : w.avatar || '👤';
                    div.innerHTML = `
                        <div class="place-avatar">${av}</div>
                        <div class="place-name">${w.name}</div>
                        <div class="place-pts">${w.pts} pts</div>
                        <div>${p.idx + 1}${p.idx === 0 ? 'er' : 'ème'}</div>
                    `;
                    list.appendChild(div);
                }
            });
        }
    </script>
</body>
</html>
