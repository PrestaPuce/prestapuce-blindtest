<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Scores - Presta'Puce</title>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root { --bg-color: #1a1a1a; --accent: #f1c40f; --card-bg: rgba(44, 62, 80, 0.4); --gold: #f1c40f; --silver: #bdc3c7; --bronze: #cd7f32; --blue: #3498db; --danger: #e74c3c; --success: #2ecc71; }
        
        body { margin: 0; padding: 1vh; font-family: 'Segoe UI', sans-serif; color: white; height: 100vh; overflow: hidden; box-sizing: border-box; display: flex; flex-direction: column; background: transparent; }
        
        /* FOND DYNAMIQUE PRESTA'PUCE */
        #dynamic-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(45deg, #0f0c29, #302b63, #24243e); background-size: 300% 300%; animation: gradientBG 15s ease infinite; transition: background 0.5s ease; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* FILTRE D'ASSOMBRISSEMENT */
        #bg-protection { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: rgba(0, 0, 0, 0.5); pointer-events: none; }

        #blur-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); z-index: 4000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
        #blur-overlay.active { opacity: 1; pointer-events: auto; }

        header { display: flex; align-items: center; justify-content: center; height: 12vh; position: relative; margin-bottom: -2vh; flex-shrink: 0; z-index: 10; display: none; }
        .header-center { display: flex; align-items: center; gap: 1vw; background: rgba(0,0,0,0.5); padding: 1vh 3vw 1vh 1vw; border-radius: 50px; border: 1px solid rgba(241, 196, 15, 0.3); backdrop-filter: blur(5px); }
        .title-group { display: flex; flex-direction: column; align-items: center; line-height: 1; }
        
        #event-name-display { font-size: clamp(1.5rem, 3.5vh, 2.8rem); margin: 0; color: white; text-transform: uppercase; font-weight: 900; text-shadow: 0 2px 5px rgba(0,0,0,0.8); } 
        #mj-name-display { font-size: clamp(1rem, 2.2vh, 1.5rem); font-weight: bold; color: var(--accent); margin-top: 0.5vh; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .room-code-display { font-size: clamp(0.7rem, 1.8vh, 1.1rem); color: rgba(255,255,255,0.7); font-family: monospace; margin-top: 0.8vh; font-weight: bold; background: rgba(0,0,0,0.4); padding: 0.2vh 1vw; border-radius: 10px; border: 1px dashed rgba(255,255,255,0.2); }
        .room-highlight { color: white; }
        
        /* ANIMATION FLIP 3D DU LOGO */
        .flip-container { width: 8vh; height: 8vh; perspective: 1000px; margin-right: 1vw; }
        .flip-inner { position: relative; width: 100%; height: 100%; text-align: center; transform-style: preserve-3d; }
        .flip-inner.animate { animation: flipAnim 10s infinite; }
        .flip-front, .flip-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; }
        .flip-back { transform: rotateY(180deg); }
        .flip-front img, .flip-back img { width: 100%; height: 100%; object-fit: contain; }
        
        @keyframes flipAnim {
            0%, 40% { transform: rotateY(0deg); }
            50%, 90% { transform: rotateY(180deg); }
            100% { transform: rotateY(360deg); }
        }

        /* AFFICHEUR DE VERSION (En bas à droite) */
        .version-tag { position: fixed; bottom: 1vh; right: 1vw; color: rgba(255, 255, 255, 0.3); font-size: clamp(0.7rem, 1.5vh, 1rem); font-family: monospace; z-index: 9999; pointer-events: none; }
        
        #qr-box { display: none; position: fixed; top: 1vh; left: 1vw; background: white; padding: 0.5vh; border-radius: 8px; text-align: center; color: black; z-index: 5000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transform-origin: top left; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: zoom-in; width: 10.5vh; }
        #qr-box img { width: 100% !important; height: auto !important; display: block; }
        #qr-box.zoomed { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50vmin; padding: 2vmin; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); cursor: zoom-out; }
        #qr-label { font-size: 0.8vh; font-weight: bold; margin-top: 0.2vh; transition: font-size 0.3s; }
        #qr-box.zoomed #qr-label { font-size: 3vmin; margin-top: 1vmin; }

        #btn-fullscreen { display: none; position: fixed; top: 1vh; right: 1vw; z-index: 5000; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 0; border-radius: 50%; cursor: pointer; width: 4vh; height: 4vh; align-items: center; justify-content: center; transition: all 0.3s ease; opacity: 0.4; }
        #btn-fullscreen:hover { opacity: 1; background: var(--accent); color: black; transform: scale(1.1); }
        #btn-fullscreen svg { width: 60%; height: 60%; fill: currentColor; }
        .hide-ui { opacity: 0 !important; pointer-events: none; }

        #btn-hof { display: none; position: fixed; top: 6vh; right: 1vw; background: rgba(0,0,0,0.5); border: 1px solid var(--accent); color: var(--accent); padding: 0.5vh 1.5vw; border-radius: 15px; cursor: pointer; font-size: clamp(0.6rem, 1.5vh, 1rem); font-weight: bold; transition: 0.2s; z-index: 1500; }
        #btn-hof:hover { background: var(--accent); color: black; }
		
        .main-container { display: none; grid-template-columns: 1fr 1fr; gap: 2vw; flex-grow: 1; padding: 0 1vw; overflow: hidden; margin-top: 0; }
        .column-wrapper { display: flex; flex-direction: column; height: 100%; overflow: hidden; position: relative; }
        .column-title { text-align: center; font-size: clamp(1rem, 3vh, 2rem); color: var(--accent); text-transform: uppercase; border-bottom: 1px solid rgba(241, 196, 15, 0.5); flex-shrink: 0; letter-spacing: 1px; padding-bottom: 2px; margin-bottom: 5px; line-height: 1.1; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        #player-list, #global-list { overflow-y: auto; overflow-x: hidden; flex-grow: 1; padding-right: 5px; padding-bottom: 10px; position: relative; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        .card { background: var(--card-bg); display: flex; align-items: center; padding: 0 1vw; border-radius: 8px; margin-bottom: 0.8vh; border-left: 0.5vw solid var(--accent); height: 7vh; transition: border 0.3s, background 0.3s, box-shadow 0.3s; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); border-left: 0.5vw solid var(--accent); }
        .avatar, .crest { width: 5vh; display: flex; justify-content: center; align-items: center; font-size: 2.5vh; }
        .crest-bg { padding: 0; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .crest-bg.native-svg { background: white; padding: 2px; }
        .crest img, .avatar img { width: 4vh; height: 4vh; object-fit: contain; } 
        .info { flex: 1; margin-left: 1vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: baseline; gap: 0.5vw; line-height: 1; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .info b { font-size: clamp(0.9rem, 2.5vh, 1.8rem); }
        .team-tag { font-size: clamp(0.7rem, 2vh, 1.2rem); color: #bdc3c7; font-style: italic; font-weight: normal; }
        .pts { font-size: clamp(1rem, 3vh, 2rem); font-weight: 800; background: rgba(0,0,0,0.5); padding: 0 1vw; border-radius: 6px; color: var(--accent); min-width: 4vw; text-align: center; line-height: 1.4; transition: background 0.3s, color 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        
        @keyframes scorePulse { 0% { transform: scale(1); background: rgba(0,0,0,0.5); color: var(--accent); } 20% { transform: scale(1.4); background: white; color: black; box-shadow: 0 0 15px white; } 100% { transform: scale(1); background: rgba(0,0,0,0.5); color: var(--accent); } }
        .flash-score { animation: scorePulse 0.8s cubic-bezier(0.25, 1, 0.5, 1) !important; }

        #big-anim-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 6000; pointer-events: none; }
        .big-score-text { font-size: 35vh; font-weight: 900; color: white; text-shadow: 0 10px 50px rgba(241, 196, 15, 0.8), 0 0 20px rgba(241, 196, 15, 1); transform: scale(0); opacity: 0; animation: superPopup 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes superPopup { 0% { transform: scale(0) rotate(-15deg); opacity: 0; } 20% { transform: scale(1.2) rotate(5deg); opacity: 1; } 40% { transform: scale(1) rotate(0deg); opacity: 1; text-shadow: 0 10px 50px rgba(241, 196, 15, 0.8); } 80% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0px); } 100% { transform: scale(2) rotate(10deg); opacity: 0; filter: blur(20px); } }

        .last-buzzed { border-color: transparent !important; background: rgba(46, 204, 113, 0.5); box-shadow: inset 0 0 0 0.5vw #2ecc71, 0 0 2vh #2ecc71 !important; transform: scale(1.02); z-index: 10; position: relative; }
        .inactive-card { opacity: 0.6; filter: grayscale(0.8); border-left-color: #7f8c8d; }
        .pause-badge { background: #7f8c8d; color: white; font-size: 0.5em; padding: 2px 5px; border-radius: 4px; margin-left: 10px; vertical-align: middle; }

        .rank-1-card { border: 2px solid var(--gold) !important; box-shadow: 0 0 15px rgba(241, 196, 15, 0.5) !important; background: rgba(241, 196, 15, 0.25) !important; border-left: 0.5vw solid var(--gold) !important; }
        .rank-1-card .pts { background: var(--gold) !important; color: black !important; border-color: var(--gold); }
        .rank-2-card { border: 1px solid var(--silver) !important; box-shadow: 0 0 10px rgba(189, 195, 199, 0.3) !important; background: rgba(189, 195, 199, 0.2) !important; border-left: 0.5vw solid var(--silver) !important; }
        .rank-2-card .pts { background: var(--silver) !important; color: black !important; }
        .rank-3-card { border: 1px solid var(--bronze) !important; box-shadow: 0 0 10px rgba(205, 127, 50, 0.3) !important; background: rgba(205, 127, 50, 0.2) !important; border-left: 0.5vw solid var(--bronze) !important; }
        .rank-3-card .pts { background: var(--bronze) !important; color: white !important; }

        /* PODIUM CSS CORRIGÉ (V1.171) */
        #podium-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #141414; z-index: 3000; flex-direction: column; align-items: center; justify-content: center; padding: 2vh; box-sizing: border-box; overflow-y: auto; }
        #podium-content { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 3vw; margin-top: 2vh; }
        .step { text-align: center; display: flex; flex-direction: column; align-items: center; width: 20vw; }
        .step-block { width: 100%; border-radius: 15px 15px 0 0; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 2vh; font-size: 4vh; font-weight: bold; color: rgba(0,0,0,0.5); box-shadow: 0 1vh 3vh rgba(0,0,0,0.5); }
        
        .rank-1 .trophy-img { width: 20vh; height: 20vh; margin-bottom: 1vh; animation: popTrophy 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both, bounceTrophy 2s ease-in-out 0.6s infinite !important; }
        .rank-1 .step-block { height: 25vh; background: linear-gradient(to bottom, #f1c40f, #f39c12); }
        .rank-2 .trophy-img { width: 15vh; height: 15vh; margin-bottom: 1vh; animation: trophyZoom 1.5s infinite alternate; }
        .rank-2 .step-block { height: 18vh; background: linear-gradient(to bottom, #bdc3c7, #7f8c8d); }
        .rank-3 .trophy-img { width: 12vh; height: 12vh; margin-bottom: 1vh; animation: trophyZoom 1.5s infinite alternate; }
        .rank-3 .step-block { height: 12vh; background: linear-gradient(to bottom, #e67e22, #d35400); }
        .winner-name { font-size: clamp(1.2rem, 3vh, 2.5rem); font-weight: bold; margin-bottom: 1vh; text-shadow: 0 2px 4px black; }
        .winner-score { font-size: clamp(1.5rem, 4vh, 3rem); color: var(--accent); font-weight: 900; }
        
        @keyframes trophyZoom { 0% { transform: scale(1); filter: drop-shadow(0 0 0 transparent); } 100% { transform: scale(1.1); filter: drop-shadow(0 1vh 1vh rgba(255,255,255,0.2)); } }
        @keyframes bounceTrophy { 0%, 100% { transform: scale(1) translateY(0); filter: drop-shadow(0 0 0 transparent); } 50% { transform: scale(1.1) translateY(-2vh); filter: drop-shadow(0 2vh 2vh rgba(241,196,15,0.6)); } }
        @keyframes popTrophy { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        #podium-content h1 { font-size: clamp(2rem, 8vw, 2.5rem); margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; line-height: 1.1; }
        #podium-content p { font-size: 1.3rem; color: white; margin: 0; font-weight: bold; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 20px; }
		.champion-trophy { animation: bounceTrophyScore 2s ease-in-out infinite !important; }

        .nav-btn { padding:1.5vh 3vw; font-size:2vh; background:var(--bg-color); color:white; border:1px solid white; border-radius:1vh; cursor:pointer; margin: 0 1vw; transition: 0.2s; }
        .nav-btn:hover { background: white; color: black; }
        #btn-return-podium { display: none; position: fixed; bottom: 2vh; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; border: none; padding: 1vh 2vw; border-radius: 20px; font-weight: bold; cursor: pointer; z-index: 100; box-shadow: 0 0 10px rgba(241, 196, 15, 0.5); font-size: 2vh; }
        #hof-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 4000; flex-direction: column; align-items: center; justify-content: center; }
        .hof-content { width: 60vw; background: #2c3e50; padding: 4vh; border-radius: 20px; border: 3px solid var(--accent); }

        /* LOBBY ECRAN GEANT */
        #lobby-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 2vh 5vw; box-sizing: border-box; }
        .lobby-box { background: rgba(44, 62, 80, 0.85); padding: 4vh 3vw; border-radius: 15px; text-align: center; border: 2px solid var(--accent); backdrop-filter: blur(15px); max-width: 800px; width: 100%; height: 85vh; display: flex; flex-direction: column; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .lobby-search { width: 100%; padding: 2vh; margin-bottom: 2vh; border-radius: 10px; border: 2px solid var(--accent); background: rgba(0,0,0,0.6); color: white; font-size: 1.2rem; outline: none; box-sizing: border-box; }
        .lobby-search:focus { box-shadow: 0 0 15px rgba(241,196,15,0.5); }
        .lobby-list-container { flex: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 1vh; }
        .lobby-room-line { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.5); padding: 2vh; border-radius: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; text-align: left; }
        .lobby-room-line:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); transform: translateX(5px); }
        
        /* MODALE LOGIN MJ */
        #lobby-login-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 11000; align-items: center; justify-content: center; }
        .login-box { background: rgba(44, 62, 80, 0.95); padding: 4vh 3vw; border-radius: 15px; text-align: center; border: 2px solid var(--accent); max-width: 450px; width: 90%; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .login-box input { width: 100%; padding: 1.5vh; margin-bottom: 2vh; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; box-sizing: border-box; font-size: 1.2rem; outline: none; }
        .login-box input:focus { border-color: var(--accent); }
        .login-box button { width: 100%; padding: 1.5vh; background: var(--accent); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.2s; text-transform: uppercase; margin-bottom: 1vh; }
        .login-box button:hover { transform: scale(1.05); }
		
		/* Effet de flou sur le contenu principal quand le wrapper est actif */
        .blur-active #main-view, .blur-active #qr-box {
        filter: blur(15px);
        transition: filter 0.5s ease;
        }
    </style>
</head>

    <div id="dynamic-bg"></div>
    <div id="bg-protection"></div>
    <div id="big-anim-overlay"></div>
    <div id="giant-buzzer-wrapper" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:4500; align-items:center; justify-content:center;">
        
        <div id="giant-buzzer-display" style="display:flex; flex-direction:column; align-items:center; background:rgba(46, 204, 113, 0.95); border:4px solid white; border-radius:30px; padding:5vh 8vw; box-shadow:0 20px 50px rgba(0,0,0,0.9); text-align:center; min-width: 40vw;">
            <div id="giant-buzzer-avatar" style="width:18vh; height:18vh; font-size:12vh; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:2vh; border: 5px solid white; overflow:hidden;">👤</div>
            <div id="giant-buzzer-name" style="font-size:6vh; font-weight:900; color:white; text-transform:uppercase;">PSEUDO</div>
            
            <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-top:1vh;">
                <img id="giant-team-icon" style="width:5vh; height:5vh; object-fit:contain; display:none;">
                <div id="giant-buzzer-team" style="font-size:3vh; font-weight:bold; color:var(--accent);">ÉQUIPE</div>
            </div>
        </div>

        <div id="giant-score-anim" style="display:none; position:absolute; font-size:25vh; font-weight:900; color:white; text-shadow:0 10px 30px rgba(0,0,0,0.9); animation: scorePop 0.8s ease-out;">+3</div>
    </div>
    <style>
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes scorePop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    </style>
    <div id="version-display" class="version-tag">v1.181</div>

    <div id="lobby-screen" style="display:none;">
        <div class="lobby-box">
            <img src="https://firebasestorage.googleapis.com/v0/b/prestapuce-buzz.firebasestorage.app/o/LOGO%20BUZ'TA%20PUCE%20FOND%20TRANSPARENT%20(1)%20(1).png?alt=media&token=0b71fa08-4047-4439-be45-37fcd40dffad" style="width:120px; margin: 0 auto 2vh auto;">
            <h1 style="color:white; margin:0 0 2vh 0; font-size: 2rem; text-shadow: 0 2px 5px black;">ÉCRANS GÉANTS</h1>
            
            <div style="position:relative;">
                <input type="text" id="lobby-search" class="lobby-search" placeholder="🔍 Rechercher un événement, un animateur, une date..." oninput="renderLobbyRooms(); document.getElementById('clear-lobby-search').style.display = this.value.length > 0 ? 'block' : 'none';">
                <span id="clear-lobby-search" onclick="document.getElementById('lobby-search').value=''; renderLobbyRooms(); this.style.display='none';" style="position:absolute; right:15px; top:40%; transform:translateY(-50%); font-size:1.5rem; cursor:pointer; color:white; display:none;">✕</span>
            </div>
            
            <div id="lobby-room-list" class="lobby-list-container">
                <div style="text-align:center; color:#7f8c8d; font-style:italic; padding: 20px;">Chargement du réseau mondial...</div>
            </div>
        </div>
    </div>

    <div id="lobby-login-modal">
        <div class="login-box">
            <h2 style="color:var(--accent); margin-top:0;">SÉCURITÉ ANIMATEUR</h2>
            <p style="color:#bdc3c7; font-size:1rem; margin-bottom:3vh;">Saisissez vos identifiants pour afficher cette salle.</p>
            <input type="hidden" id="login-target-room">
            <input type="email" id="mj-email" placeholder="Email Animateur" autocomplete="email" onkeypress="if(event.key==='Enter') executeLobbyLogin()">
            <input type="password" id="mj-pass" placeholder="Mot de passe" autocomplete="current-password" onkeypress="if(event.key==='Enter') executeLobbyLogin()">
            <button onclick="executeLobbyLogin()">DÉVERROUILLER L'ÉCRAN</button>
            <button onclick="document.getElementById('lobby-login-modal').style.display='none'" style="background:transparent; border:1px solid var(--danger); color:var(--danger);">Annuler</button>
        </div>
    </div>

    <div id="blur-overlay" onclick="toggleQRZoom()"></div>

        <svg id="icon-fs" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </div>

        <div id="qrcode"></div>
        <div id="qr-label">REJOINDRE</div>

    <header id="main-header">

                <div class="flip-container">

                        <div class="flip-front">
                            <img src="https://firebasestorage.googleapis.com/v0/b/prestapuce-buzz.firebasestorage.app/o/LOGO%20BUZ'TA%20PUCE%20FOND%20TRANSPARENT%20(1)%20(1).png?alt=media&token=0b71fa08-4047-4439-be45-37fcd40dffad">
                        </div>
                        <div class="flip-back">

                        </div>
                    </div>
                </div>
            </a>
            <div class="title-group">
                <h1 id="event-name-display">PARTIE EN COURS</h1>

    <div id="main-view" class="main-container">
        <div class="column-wrapper">
            <div class="column-title">Joueurs</div>
            <div id="player-list"></div>
        </div>

    <div id="podium-screen">
        <h1 style="font-size:5vh; color:var(--accent); margin-bottom: 2vh;">RÉSULTATS FINAUX</h1>
        <div id="podium-display" class="podium-container"></div>
        <div style="margin-top:5vh; display:flex; gap:3vw;">
            <button onclick="showLeaderboard()" class="nav-btn">Voir le classement complet</button>

    <div id="hof-overlay" onclick="toggleHOF()">
        <div class="hof-content" onclick="event.stopPropagation()">
            <h1 style="color:var(--accent); margin-top:0;">🏆 TOP 10 MONDIAL</h1>
            <div id="hof-list"></div>
            <button onclick="toggleHOF()" style="margin-top:20px; width:100%; padding:10px; border-radius:10px; border:none; background:var(--accent); font-weight:bold; cursor:pointer;">RETOUR AU JEU</button>
        </div>

    <script>
        const CLIENT_VERSION = "1.181";
        
        document.addEventListener("DOMContentLoaded", () => {
            document.title = "Scores - Presta'Puce (v" + CLIENT_VERSION + ")";
            const versionDisp = document.getElementById('version-display');
            if(versionDisp) versionDisp.innerText = "v" + CLIENT_VERSION;
            
            checkLobbyOrRoom();
        });

        const firebaseConfig = { apiKey: "AIzaSyAf1Vl_O8SHJeFjHavKBJgUFGGy73I8t-o", authDomain: "prestapuce-buzz.firebaseapp.com", databaseURL: "https://prestapuce-buzz-default-rtdb.europe-west1.firebasedatabase.app", projectId: "prestapuce-buzz", storageBucket: "prestapuce-buzz.firebasestorage.app", messagingSenderId: "907270883505", appId: "1:907270883505:web:197efec0b99db28180ba90", measurementId: "G-J04SC2DFFF" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        
        // Écoute dynamique de la version depuis la base de données
        db.ref('config/versions/scores').on('value', snap => {
            if(snap.exists()) {
                const versionDisp = document.getElementById('version-display');
                if(versionDisp) versionDisp.innerText = snap.val();
                document.title = "Scores - Presta'Puce (" + snap.val() + ")";
            }
        });

        let allGlobalRooms = [];
        let roomID = "";
        let roomRef = null;

        function checkLobbyOrRoom() {
            const urlParams = new URLSearchParams(window.location.search);
            roomID = urlParams.get('room');
            
            if (roomID) {
                document.getElementById('lobby-screen').style.display = 'none';
                document.getElementById('main-header').style.display = 'flex';
                document.getElementById('btn-fullscreen').style.display = 'flex';
                initScoreboard();
            } else {
                document.getElementById('lobby-screen').style.display = 'flex';
                fetchLobbyRooms();
            }
        }

        function fetchLobbyRooms() {
            db.ref('rooms').orderByChild('createdAt').limitToLast(100).on('value', snap => {
                allGlobalRooms = [];
                const rooms = snap.val();
                if(rooms) {
                    Object.keys(rooms).forEach(k => {
                        allGlobalRooms.push({ id: k, ...rooms[k] });
                    });
                }
                allGlobalRooms.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
                renderLobbyRooms();
            });
        }

        function renderLobbyRooms() {
            const query = document.getElementById('lobby-search').value.toLowerCase().trim();
            const container = document.getElementById('lobby-room-list');
            container.innerHTML = "";
            
            if(allGlobalRooms.length === 0) {
                container.innerHTML = "<div style='text-align:center; color:#7f8c8d; font-style:italic; padding: 20px;'>Aucune partie trouvée.</div>";
                return;
            }

            let matches = allGlobalRooms;
            if (query) {
                matches = allGlobalRooms.filter(r => {
                    const ev = (r.eventName || "").toLowerCase();
                    const mj = (r.mjName || "").toLowerCase();
                    const d = new Date(r.createdAt || Date.now()).toLocaleDateString('fr-FR');
                    return ev.includes(query) || mj.includes(query) || r.id.includes(query) || d.includes(query);
                });
            }

            if(matches.length === 0) {
                container.innerHTML = "<div style='text-align:center; color:#7f8c8d; font-style:italic; padding: 20px;'>Aucune salle ne correspond à la recherche.</div>";
                return;
            }

            matches.forEach(r => {
                const d = new Date(r.createdAt || Date.now()).toLocaleDateString('fr-FR');
                const badgeState = r.isArchived ? "🗄️ ARCHIVÉE" : "🟢 EN COURS";
                const badgeColor = r.isArchived ? "#7f8c8d" : "var(--success)";
                const badgeBg = r.isArchived ? "rgba(127,140,141,0.2)" : "rgba(46,204,113,0.2)";
                
                const div = document.createElement('div');
                div.className = "lobby-room-line";
                div.innerHTML = `
                    <div style="flex:1;">
                        <b style="color:var(--accent); font-size:1.3rem;">${r.eventName || "PARTIE EN COURS"}</b><br>
                        <span style="color:#ecf0f1; font-size:1rem;">Animé par ${r.mjName || "MJ"} | ${d}</span>
                    </div>
                    <div style="text-align:right;">
                        <span style="color:${badgeColor}; border:1px solid ${badgeColor}; background:${badgeBg}; font-weight:bold; font-size:0.8rem; padding:4px 8px; border-radius:4px;">${badgeState}</span><br>
                        <span style="color:rgba(255,255,255,0.4); font-size:0.8rem; font-family:monospace; display:block; margin-top:5px;">#${r.id}</span>
                    </div>
                `;
                div.onclick = () => showMJLogin(r.id);
                container.appendChild(div);
            });
        }

        function showMJLogin(targetRoomId) {
            document.getElementById('lobby-login-modal').style.display = 'flex';
            document.getElementById('login-target-room').value = targetRoomId;
            setTimeout(() => document.getElementById('mj-email').focus(), 100);
        }

        function executeLobbyLogin() {
            const email = document.getElementById('mj-email').value.trim();
            const pass = document.getElementById('mj-pass').value;
            const targetRoom = document.getElementById('login-target-room').value;
            
            if(!email || !pass) return alert("Veuillez remplir tous les champs.");
            
            auth.signInWithEmailAndPassword(email, pass).then((userCredential) => {
                const user = userCredential.user;
                if (user.email === 'contact@prestapuce.com') {
                    window.location.href = "?room=" + targetRoom;
                    return;
                }
                
                db.ref('rooms/' + targetRoom + '/mj').once('value').then(snap => {
                    const roomMjUid = snap.val();
                    if (roomMjUid === user.uid) {
                        window.location.href = "?room=" + targetRoom;
                    } else {
                        auth.signOut();
                        alert("Accès refusé : Vous n'êtes pas l'animateur de cette salle.");
                    }
                }).catch(err => {
                    auth.signOut();
                    alert("Erreur lors de la vérification des droits.");
                });
                
            }).catch(err => {
                alert("Identifiants invalides ou erreur de connexion.");
            });
        }

        let scoresData = {}, teamsData = {}, currentBuzzer = null, currentBuzzerId = null;
        let buzzHistory = [];
        let isGameFinished = false;
        
        let previousPts = {}; 
        let lastPointTime = {}; 
        let currentGameState = 'waiting'; // PATCH V1.176
        let pendingAnimations = {}; 
        let animatingScores = {}; 
        let activeIntervals = {};
        let isBigAnimPlaying = false;

        function initScoreboard() {
            document.getElementById('room-title').innerText = roomID;
            roomRef = db.ref('rooms/' + roomID);
            const currentPath = window.location.href.split('?')[0].replace('scores', 'index');
            const playURL = currentPath + "?room=" + roomID;
            
            new QRCode(document.getElementById("qrcode"), { text: playURL, width: 250, height: 250, correctLevel : QRCode.CorrectLevel.H });

            roomRef.child('customBackground').on('value', snap => {
                const bgDiv = document.getElementById('dynamic-bg');
                if (snap.exists() && snap.val() !== "") {
                    bgDiv.style.background = `url('${snap.val()}') center/cover no-repeat`;
                    bgDiv.style.animation = 'none';
                } else {
                    bgDiv.style.background = 'linear-gradient(45deg, #0f0c29, #302b63, #24243e)';
                    bgDiv.style.backgroundSize = '300% 300%';
                    bgDiv.style.animation = 'gradientBG 15s ease infinite';
                }
            });

            roomRef.child('eventName').on('value', snap => {
                if(snap.exists()) document.getElementById('event-name-display').innerText = snap.val();
                else document.getElementById('event-name-display').innerText = "PARTIE EN COURS";
            });
            
            roomRef.child('mjName').on('value', snap => {
                if(snap.exists()) document.getElementById('mj-name-display').innerText = "Animé par " + snap.val();
                else document.getElementById('mj-name-display').innerText = "Animé par MJ";
            });

            roomRef.child('mjLogo').on('value', snap => { 
                const logoVal = snap.val();
                const defaultLogo = "https://firebasestorage.googleapis.com/v0/b/prestapuce-buzz.firebasestorage.app/o/LOGO%20BUZ'TA%20PUCE%20FOND%20TRANSPARENT%20(1)%20(1).png?alt=media&token=0b71fa08-4047-4439-be45-37fcd40dffad";
                const oldWixLogo = "https://static.wixstatic.com/media/eda9e4_e7ab6af2d5a7428f9bc7e4af454e20ef~mv2.png";
                
                const flipInner = document.getElementById('logo-flip-inner');
                const mjLogoImg = document.getElementById('display-mj-logo');
                
                document.getElementById('page-favicon').href = (logoVal && logoVal !== "") ? logoVal : defaultLogo;

                if(logoVal && logoVal !== "" && logoVal !== oldWixLogo && logoVal !== defaultLogo) { 
                    mjLogoImg.src = logoVal;
                    flipInner.classList.add('animate');
                } else {
                    mjLogoImg.src = "";
                    flipInner.classList.remove('animate');
                    flipInner.style.transform = "rotateY(0deg)";
                }
            });
            
            roomRef.child('mjLink').on('value', snap => {
                const linkElement = document.getElementById('mj-logo-link');
                if(snap.exists() && snap.val() !== "") { linkElement.href = snap.val(); linkElement.style.pointerEvents = "auto"; } 
                else { linkElement.href = "#"; linkElement.style.pointerEvents = "none"; }
            });
            
            /* --- PATCH V1.171 / 1.176 : BYPASS PODIUM ET GESTION ÉTAT --- */
            let initialScoreLoad = true;
            roomRef.child('gameState').on('value', snap => {
                const state = snap.val();
                currentGameState = state ? state.status : 'waiting'; // Mémorise l'état
                if (state && state.status === 'endGame') {
                    isGameFinished = true; 
                    if (initialScoreLoad) {
                        showLeaderboard(); // Affiche direct le tableau si la partie était déjà finie
                    } else {
                        showPodium(); // Affiche le podium si le MJ clique sur "FIN DE PARTIE" en direct
                    }
                } 
                else { 
                    isGameFinished = false; 
                    showLeaderboard(); 
                }
                initialScoreLoad = false;
            });

            roomRef.child('buzzers').on('value', snap => {
                const val = snap.val(); currentBuzzer = val ? val.pseudo : null; currentBuzzerId = val ? val.id : null;
                if (currentBuzzer) {
                    if (!buzzHistory.includes(currentBuzzer)) { buzzHistory.push(currentBuzzer); } 
                    else { buzzHistory = buzzHistory.filter(name => name !== currentBuzzer); buzzHistory.push(currentBuzzer); }
                }
                updateDisplay();
            });

            roomRef.child('players').on('value', snap => { scoresData = snap.val() || {}; updateDisplay(); });
            roomRef.child('teams').on('value', snap => { teamsData = snap.val() || {}; updateDisplay(); });
        }

        function toggleQRZoom() {
            const qrBox = document.getElementById('qr-box');
            const overlay = document.getElementById('blur-overlay');
            if (qrBox.classList.contains('zoomed')) { qrBox.classList.remove('zoomed'); overlay.classList.remove('active'); } 
            else { qrBox.classList.add('zoomed'); overlay.classList.add('active'); }
        }

        function showBigPlus3() {
            if (isBigAnimPlaying) return;
            isBigAnimPlaying = true;
            const overlay = document.getElementById('big-anim-overlay');
            overlay.innerHTML = `<div class="big-score-text">+3</div>`;
            setTimeout(() => { overlay.innerHTML = ''; isBigAnimPlaying = false; }, 2000);
        }

        function trackScores(id, newPts) {
            let oldPts = previousPts[id];
            
            if (animatingScores[id] !== undefined) {
                if (newPts > animatingScores[id].targetPts) {
                    animatingScores[id].targetPts = newPts;
                }
                previousPts[id] = newPts;
                return;
            }

            if (oldPts !== undefined && newPts > oldPts) {
                let delta = newPts - oldPts;
                if (delta === 3) {
                    pendingAnimations[id] = { start: oldPts, end: newPts, type: 'plus3' };
                    animatingScores[id] = { currentPts: oldPts, targetPts: newPts }; 
                    showBigPlus3();
                } else if (delta === 1) {
                    pendingAnimations[id] = { start: newPts, end: newPts, type: 'flash' };
                }
                lastPointTime[id] = Date.now();
            }
            previousPts[id] = newPts;
        }

        /* --- PATCH V1.175 : STATS DÉTAILLÉES & EXORCISME FANTÔMES --- */
        function calculateGlobalScores() {
            const listEquipes = Object.keys(teamsData);
            // CORRECTION 1 : On désintègre les joueurs fantômes ("undefined") avant tout calcul !
            const allPlayers = Object.keys(scoresData)
                .map(uid => ({ ...scoresData[uid], uid: uid }))
                .filter(p => p.name && p.name !== "undefined" && p.name.trim() !== "");
                
            let rankingMap = new Map();

            listEquipes.forEach(tName => {
                const team = teamsData[tName];
                if (team.banned === true) return;
                let score = team.active === false ? (team.frozenScore || 0) : (team.bonus || 0);
                rankingMap.set("team-" + tName, { 
                    dataId: "team-" + tName, name: tName, pts: score, icon: team.icon, 
                    isTeam: true, count: 0, historicalCount: 0, tInactive: 0, tBanned: 0, 
                    isActive: team.active !== false, captainName: "" 
                });
            });

            allPlayers.forEach(p => {
                const statutEquipe = (p.teamName && p.teamName !== "Solo") ? p.teamName : "Solo";
                if (statutEquipe !== "Solo" && rankingMap.has("team-" + statutEquipe)) {
                    let teamEntry = rankingMap.get("team-" + statutEquipe);
                    teamEntry.historicalCount++;
                    if (p.banned) teamEntry.tBanned++;
                    else if (p.active === false) teamEntry.tInactive++;
                    else teamEntry.count++;
                    
                    if (p.isCaptain) teamEntry.captainName = p.name;
                    if (teamEntry.isActive && !p.banned) teamEntry.pts += (p.pts || 0); 
                } else {
                    if (!p.banned) { 
                        rankingMap.set("solo-" + p.name, { 
                            dataId: "solo-" + p.name, name: p.name, pts: (p.pts || 0), 
                            avatar: p.avatar, isTeam: false, isActive: p.active !== false, 
                            count: 1, historicalCount: 1
                        }); 
                    }
                }
            });
            return Array.from(rankingMap.values()).sort((a, b) => b.pts - a.pts);
        }

        function getSortedRanking() {
            let unsorted = calculateGlobalScores();
            return unsorted.sort((a, b) => {
                let displayPtsA = animatingScores[a.dataId] !== undefined ? animatingScores[a.dataId].currentPts : a.pts;
                let displayPtsB = animatingScores[b.dataId] !== undefined ? animatingScores[b.dataId].currentPts : b.pts;

                if (displayPtsB !== displayPtsA) return displayPtsB - displayPtsA; 
                if (!a.isTeam && b.isTeam) return -1;
                if (a.isTeam && !b.isTeam) return 1;

                let countA = Math.max(1, a.count); 
                let countB = Math.max(1, b.count);
                if (countA !== countB) return countA - countB; 
                
                let histA = Math.max(1, a.historicalCount || a.count);
                let histB = Math.max(1, b.historicalCount || b.count);
                if (histA !== histB) return histA - histB;

                let timeA = lastPointTime[a.dataId] || 0; 
                let timeB = lastPointTime[b.dataId] || 0;
                if (timeB !== timeA) return timeA - timeB; 
                
                // CORRECTION 2 : Bouclier absolu contre le crash alphabétique !
                const safeNameA = a.name || "Inconnu";
                const safeNameB = b.name || "Inconnu";
                return safeNameA.localeCompare(safeNameB); 
            });
        }

        function renderAvatar(av) {
            if(av && av.length > 20) {
                return `<div style="width:100%; height:100%; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; background:transparent;"><img src="${av}" style="width:100%; height:100%; object-fit:cover;"></div>`;
            }
            return `<span style="font-size:200%; display:flex; align-items:center; justify-content:center; width:100%; height:100%;">${av || '👤'}</span>`;
        }

        function animateList(containerId, newHTML) {
            const container = document.getElementById(containerId);
            const oldCards = Array.from(container.children);
            const oldRects = new Map();
            oldCards.forEach(card => {
                const id = card.getAttribute('data-id');
                if(id) oldRects.set(id, card.getBoundingClientRect());
            });

            container.innerHTML = newHTML;
            const newCards = Array.from(container.children);
            
            newCards.forEach(card => {
                const id = card.getAttribute('data-id');
                if(id && oldRects.has(id)) {
                    const oldRect = oldRects.get(id);
                    const newRect = card.getBoundingClientRect();
                    const deltaY = oldRect.top - newRect.top;
                    if (deltaY !== 0) {
                        card.style.transform = `translateY(${deltaY}px)`;
                        card.style.transition = 'none';
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                card.style.transform = '';
                                card.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
                            });
                        });
                    }
                }
            });
        }

        /* --- PATCH V1.174 : RÉPARATION DU CLASSEMENT EN DIRECT --- */
        function executeStepAnimation(dataId, start, end) {
            if (activeIntervals[dataId]) clearInterval(activeIntervals[dataId]);
            
            activeIntervals[dataId] = setInterval(() => {
                if (animatingScores[dataId]) {
                    animatingScores[dataId].currentPts++;
                    
                    let els = document.querySelectorAll(`[data-id="${dataId}"] .pts`);
                    if (els.length > 0) {
                        els.forEach(el => {
                            el.innerText = animatingScores[dataId].currentPts;
                            el.classList.remove('flash-score');
                            void el.offsetWidth;
                            el.classList.add('flash-score');
                        });
                    }
                    
                    if (animatingScores[dataId].currentPts >= animatingScores[dataId].targetPts) { 
                        clearInterval(activeIntervals[dataId]); 
                        delete activeIntervals[dataId];
                        delete animatingScores[dataId]; 
                        
                        // C'EST ICI LA MAGIE : On force le tableau à se re-trier en direct une fois l'animation finie !
                        updateDisplay(); 
                    }
                } else {
                    clearInterval(activeIntervals[dataId]); 
                    delete activeIntervals[dataId];
                }
            }, 800); 
        }

        function updateDisplay() {
            // CORRECTION 3 : On bloque l'affichage visuel des fantômes pour l'écran géant
            const allPlayers = Object.keys(scoresData)
                .map(uid => ({ ...scoresData[uid], uid: uid }))
                .filter(p => p.name && p.name !== "undefined" && p.name.trim() !== "");
            
            allPlayers.forEach(p => trackScores('player-' + p.uid, p.pts || 0));
            calculateGlobalScores().forEach(item => trackScores(item.dataId, item.pts));

            const listEquipes = Object.keys(teamsData);
            let pListHTML = "";
            
            // PATCH V1.181 : Séquençage Show TV Strict
            const giantWrapper = document.getElementById('giant-buzzer-wrapper');
            const giantDisplay = document.getElementById('giant-buzzer-display');
            const scoreZone = document.getElementById('giant-score-anim');

            if (currentBuzzerId) {
                const buzzerPlayer = allPlayers.find(pl => pl.uid === currentBuzzerId);
                
                if (buzzerPlayer) {
                    giantWrapper.style.display = 'flex';

                    if (currentGameState === 'awarded') {
                        // 1. On efface la grosse tête et le fond noir INSTANTANÉMENT
                        giantDisplay.style.display = 'none';
                        document.body.classList.remove('blur-active'); 
                        giantWrapper.style.background = 'transparent';
                        
                        // 2. On calcule les points : S'il y a des points, on affiche le chiffre flottant, sinon rien.
                        let ptsGagnes = (buzzerPlayer.pts || 0) - (previousPts['player-'+currentBuzzerId] || 0);
                        if (ptsGagnes > 0) {
                            scoreZone.style.display = 'block';
                            scoreZone.innerText = `+${ptsGagnes}`;
                        } else {
                            scoreZone.style.display = 'none'; // Pas de +0 !
                        }

                        // 3. On ferme totalement le wrapper après 1.5s
                        setTimeout(() => { if (currentGameState === 'awarded') giantWrapper.style.display = 'none'; }, 1500);

                    } else {
                        // Mode BUZZ : On met le flou, l'encart vert, et on cache le score flottant
                        document.body.classList.add('blur-active'); 
                        giantWrapper.style.background = 'rgba(0,0,0,0.6)';
                        giantDisplay.style.display = 'flex';
                        scoreZone.style.display = 'none';
                        
                        // Infos du joueur
                        document.getElementById('giant-buzzer-name').innerText = buzzerPlayer.name;
                        let isTeam = buzzerPlayer.teamName && listEquipes.includes(buzzerPlayer.teamName);
                        document.getElementById('giant-buzzer-team').innerText = isTeam ? `Équipe ${buzzerPlayer.teamName}` : 'Solo';
                        
                        // Blason (récupéré depuis teamsData qui est déjà en mémoire pour le classement)
                        const iconImg = document.getElementById('giant-team-icon');
                        if (isTeam && typeof teamsData !== 'undefined' && teamsData[buzzerPlayer.teamName] && teamsData[buzzerPlayer.teamName].icon) {
                            iconImg.src = teamsData[buzzerPlayer.teamName].icon;
                            iconImg.style.display = 'block';
                        } else {
                            iconImg.style.display = 'none';
                        }
                        
                        // Avatar propre (On force l'arrondi parfait même sur les photos)
                        let av = buzzerPlayer.avatar;
                        if (av && av.length > 20) {
                            document.getElementById('giant-buzzer-avatar').innerHTML = `<img src="${av}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
                        } else {
                            document.getElementById('giant-buzzer-avatar').innerHTML = av || '👤';
                        }
                    }
                }
            } else {
                giantWrapper.style.display = 'none';
                document.body.classList.remove('blur-active');
            }

            allPlayers.sort((a, b) => {
                if (a.active === false && b.active !== false) return 1;
                if (a.active !== false && b.active === false) return -1;
                if (a.uid === currentBuzzerId) return -1;
                if (b.uid === currentBuzzerId) return 1;
                let indexA = buzzHistory.indexOf(a.name);
                let indexB = buzzHistory.indexOf(b.name);
                if (indexA !== -1 && indexB !== -1) return indexB - indexA;
                if (indexA !== -1) return -1;
                if (indexB !== -1) return 1;
                return 0;
            }).forEach(p => {
                const idP = 'player-' + p.uid;
                const enEquipe = p.teamName && listEquipes.includes(p.teamName);
                const inactiveClass = p.active === false ? "inactive-card" : "";
                
                // PATCH V1.176 : On éteint l'encadré vert si les points sont donnés
                const buzzedClass = (p.uid === currentBuzzerId && currentGameState !== 'awarded') ? "last-buzzed" : "";
                
                let displayPtsP = p.pts || 0;
                if (animatingScores[idP] !== undefined) {
                    displayPtsP = animatingScores[idP].currentPts;
                }
                
                let crownIcon = p.isCaptain ? '<span style="margin-left:5px; filter:drop-shadow(0 0 5px gold); font-size: 1.1em;">👑</span>' : '';

                pListHTML += `
                    <div class="card ${buzzedClass} ${inactiveClass}" data-id="${idP}">
                        <div class="avatar">${renderAvatar(p.avatar)}</div>
                        <div class="info"><b>${p.name}${crownIcon}</b> <span class="team-tag">(${enEquipe ? p.teamName : "Solo"})</span></div>
                        <div class="pts">${displayPtsP}</div>
                    </div>`;
            });

            let gListHTML = "";
            getSortedRanking().forEach((item, index) => {
                const idG = item.dataId;
                
                let iconHtml = "";
                if (item.isTeam) {
                    if (item.icon && item.icon.startsWith('data:image/svg')) {
                        iconHtml = `<div class="crest-bg native-svg"><img src="${item.icon}" style="width:4vh; height:4vh;"></div>`;
                    } else {
                        iconHtml = `<div class="crest-bg" style="background:transparent;"><img src="${item.icon}" style="width:4vh; height:4vh; border-radius:4px; object-fit:contain;"></div>`;
                    }
                } else {
                    iconHtml = `<span>${renderAvatar(item.avatar)}</span>`;
                }
                
                let inactiveClass = item.isActive ? "" : " inactive-card";
                
                let rankClass = "";
                if (item.pts > 0 && item.isActive) {
                    if (index === 0) rankClass = " rank-1-card";
                    else if (index === 1) rankClass = " rank-2-card";
                    else if (index === 2) rankClass = " rank-3-card";
                }

                let displayPtsG = item.pts;
                if (animatingScores[idG] !== undefined) {
                    displayPtsG = animatingScores[idG].currentPts;
                }

                let infoHtml = "";
                if (item.isTeam) {
                    let capStr = item.captainName ? `👑 Cap. ${item.captainName}` : `👑 Aucun`;
                    let statsStr = `👥 ${item.historicalCount} &nbsp;|&nbsp; 🟢 ${item.count} &nbsp;|&nbsp; 🟠 ${item.tInactive} &nbsp;|&nbsp; 🔴 ${item.tBanned}`;
                    
                    infoHtml = `
                        <div style="display:flex; flex-direction:row; align-items:center; justify-content:space-between; width:100%;">
                            <div style="display:flex; flex-direction:column; justify-content:center; line-height:1.2; overflow:hidden; text-overflow:ellipsis; min-width:0; flex:1;">
                                <div style="display:flex; align-items:center; gap:0.5vw;">
                                    <b style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.name}</b>
                                    ${!item.isActive ? '<span class="pause-badge">EN PAUSE</span>' : ''}
                                </div>
                                <div style="font-size: clamp(0.7rem, 1.6vh, 0.95rem); color: var(--gold); font-weight: bold; margin-top: 0.3vh; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                                    ${capStr}
                                </div>
                            </div>
                            <div style="font-size: clamp(0.6rem, 1.5vh, 0.85rem); color: #bdc3c7; background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 8px; white-space: nowrap; margin-left: 10px; border: 1px solid rgba(255,255,255,0.1);">
                                ${statsStr}
                            </div>
                        </div>
                    `;
                } else {
                    infoHtml = `
                        <div style="display:flex; flex-direction:column; justify-content:center; line-height:1.2; width:100%; text-overflow: ellipsis; overflow: hidden;">
                            <b style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.name}</b>
                            <div style="font-size: clamp(0.6rem, 1.5vh, 0.9rem); color: #bdc3c7; font-weight: normal; margin-top: 0.3vh;">Solo</div>
                        </div>
                    `;
                }

                gListHTML += `
                    <div class="card${inactiveClass}${rankClass}" data-id="${idG}">
                        <div class="crest">${iconHtml}</div>
                        <div class="info" style="align-items: center; width: 100%;">
                            ${infoHtml}
                        </div>
                        <div class="pts">${displayPtsG}</div>
                    </div>`;
            });

            animateList('player-list', pListHTML);
            animateList('global-list', gListHTML);

            for (let id in pendingAnimations) {
                let anim = pendingAnimations[id];
                if (anim.type === 'plus3') { executeStepAnimation(id, anim.start, anim.end); } 
                else if (anim.type === 'flash') {
                    document.querySelectorAll(`[data-id="${id}"] .pts`).forEach(el => { el.classList.remove('flash-score'); void el.offsetWidth; el.classList.add('flash-score'); });
                }
                delete pendingAnimations[id];
            }
        }

        function showPodium() { 
            document.getElementById('main-view').style.display = 'none'; 
            document.getElementById('qr-box').style.display = 'none'; 
            document.getElementById('btn-return-podium').style.display = 'none'; 
            document.getElementById('blur-overlay').style.display = 'none'; 
            
            const podiumScreen = document.getElementById('podium-screen'); 
            podiumScreen.style.display = 'flex'; 
            
            let ranking = getSortedRanking(); 
            const top3 = ranking.slice(0, 3); 
            const container = document.getElementById('podium-display'); 
            container.innerHTML = ""; 
            
            const visualOrder = [1, 0, 2]; 
            /* --- PATCH V1.170 : AFFICHAGE DU CAPITAINE SUR LE PODIUM --- */
            visualOrder.forEach(idx => { 
                if (top3[idx]) { 
                    const item = top3[idx]; 
                    const rank = idx + 1; 
                    let imgHtml = ""; 
                    if(rank === 1) imgHtml = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png" class="trophy-img champion-trophy">`; 
                    if(rank === 2) imgHtml = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583319.png" class="trophy-img">`; 
                    if(rank === 3) imgHtml = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583434.png" class="trophy-img">`; 
                    
                    let avatarDisplay = item.isTeam ? `<div class="crest-bg" style="width:10vh; height:10vh; margin:0 auto;"><img src="${item.icon}" style="width:100%; height:100%; object-fit:contain;"></div>` : renderAvatar(item.avatar, 50); 
                    
                    // Ajout du nom du Capitaine sous le nom de l'équipe
                    let capHtml = (item.isTeam && item.captainName) ? `<div style="font-size: clamp(0.9rem, 2vh, 1.5rem); color: var(--gold); margin-bottom: 1.5vh; font-weight: bold; text-shadow: 0 2px 4px black;">👑 Cap. ${item.captainName}</div>` : '';

                    const div = document.createElement('div'); 
                    div.className = `step rank-${rank}`; 
                    div.innerHTML = `${imgHtml}<div class="winner-name">${item.name}</div>${capHtml}${avatarDisplay}<div class="winner-score">${item.pts} pts</div><div class="step-block">${rank}</div>`; 
                    container.appendChild(div); 
                } 
            }); 
            
            confetti({ particleCount: 300, spread: 100, origin: { y: 0.6 }, zIndex: 9999 }); 
        }

        function relaunchPodiumAnimation() {
            const container = document.getElementById('podium-display');
            container.style.opacity = '0';
            setTimeout(() => {
                container.style.opacity = '1';
                showPodium();
            }, 300);
        }

        function showLeaderboard() { 
            document.getElementById('podium-screen').style.display = 'none'; 
            document.getElementById('main-view').style.display = 'grid'; 
            document.getElementById('qr-box').style.display = 'block'; 
            document.getElementById('blur-overlay').style.display = 'block'; 
            if (isGameFinished) document.getElementById('btn-return-podium').style.display = 'block'; 
            else document.getElementById('btn-return-podium').style.display = 'none'; 
        }
        
        function toggleFullScreen() { if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(err => { console.log(err); }); } else { if (document.exitFullscreen) document.exitFullscreen(); } }
        document.addEventListener('keydown', (e) => { if(e.key.toLowerCase() === 'f') toggleFullScreen(); });
        let uiTimer; document.onmousemove = () => { document.getElementById('btn-fullscreen').classList.remove('hide-ui'); clearTimeout(uiTimer); uiTimer = setTimeout(() => { if(document.fullscreenElement) document.getElementById('btn-fullscreen').classList.add('hide-ui'); }, 3000); };
        function toggleHOF() { const overlay = document.getElementById('hof-overlay'); if(overlay.style.display === "flex") { overlay.style.display = "none"; } else { overlay.style.display = "flex"; document.getElementById('hof-list').innerHTML = "<p style='text-align:center;'>Historique global en construction...</p>"; } }
    </script>
</body>
</html>
