<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Interface - Presta'Puce (v1.104)</title>
    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/eda9e4_e7ab6af2d5a7428f9bc7e4af454e20ef~mv2.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2c3e50; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; color:white; }
        
        /* HEADER */
        header { background: #1a252f; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; }
        .header-title { display: flex; align-items: center; gap: 15px; }
        .header-title img { height: 50px; border-radius: 5px; }
        .header-title h1 { margin: 0; font-size: 1.5rem; color: #f1c40f; text-transform: uppercase; }
        .room-display { background: #e74c3c; padding: 10px 20px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer; border: 2px solid white; }

        /* LAYOUT */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* COLONNE GAUCHE */
        .left-panel { width: 320px; background: #34495e; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 2px solid #1a252f; overflow-y: auto; }
        
        /* COLONNE DROITE */
        .right-panel { flex: 1; padding: 20px; overflow-y: auto; background: #2c3e50; position: relative; }

        /* ELEMENTS UI */
        .control-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .control-card h3 { margin-top: 0; color: #bdc3c7; font-size: 0.9rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        
        .btn { width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; font-size: 1rem; transition: 0.2s; text-transform: uppercase; }
        .btn:hover { filter: brightness(1.1); transform: scale(1.02); }
        .btn-green { background: #27ae60; box-shadow: 0 4px 0 #219150; }
        .btn-red { background: #c0392b; box-shadow: 0 4px 0 #a93226; }
        .btn-blue { background: #2980b9; box-shadow: 0 4px 0 #2471a3; }
        .btn-orange { background: #d35400; box-shadow: 0 4px 0 #a04000; }
        .btn-grey { background: #7f8c8d; box-shadow: 0 4px 0 #616a6b; }

        .state-display { text-align: center; font-size: 1.2rem; font-weight: bold; padding: 15px; background: #1a252f; border-radius: 10px; margin-bottom: 10px; color: #bdc3c7; border: 2px solid #1a252f; }
        .state-display.ready { color: #2ecc71; border-color: #2ecc71; background: rgba(46, 204, 113, 0.1); }
        .state-display.blocked { color: #e74c3c; border-color: #e74c3c; background: rgba(231, 76, 60, 0.1); }
        .state-display.taken { color: #3498db; border-color: #3498db; background: rgba(52, 152, 219, 0.1); animation: pulse 1s infinite; }

        /* LISTE JOUEURS */
        .tabs { display: flex; margin-bottom: 15px; gap: 10px; }
        .tab { flex: 1; padding: 10px; background: rgba(0,0,0,0.2); text-align: center; cursor: pointer; border-radius: 8px; color: #95a5a6; font-weight: bold; }
        .tab.active { background: #f1c40f; color: #2c3e50; }

        .grid-players { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .player-card { background: white; color: #2c3e50; padding: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid #bdc3c7; position: relative; }
        .player-card.active { border-left-color: #2ecc71; }
        .player-card.buzzed { background: #3498db; color: white; transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 10; border: 3px solid #f1c40f; }
        .player-card.inactive { opacity: 0.6; filter: grayscale(1); }
        
        .p-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; margin-right: 10px; }
        .p-info { flex: 1; overflow: hidden; }
        .p-name { font-weight: bold; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-team { font-size: 0.8rem; color: #7f8c8d; }
        .player-card.buzzed .p-team { color: #d6eaf8; }

        .p-actions { display: flex; gap: 5px; align-items: center; }
        .score-badge { background: #2c3e50; color: #f1c40f; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 1.1rem; min-width: 30px; text-align: center; }
        .btn-mini { padding: 5px 8px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; color: white; }

        /* MODAL */
        #setup-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal-box { background: white; color: #2c3e50; padding: 40px; border-radius: 20px; text-align: center; width: 400px; }
        .input-setup { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #bdc3c7; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; }
        
        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
        .qr-content { background: white; padding: 20px; border-radius: 15px; text-align: center; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="setup-modal">
        <div class="modal-box">
            <h2 style="color:#e74c3c; margin-top:0;">CONFIGURATION SALLE</h2>
            <input type="text" id="setup-mj" class="input-setup" placeholder="Votre Nom (MJ)">
            <input type="number" id="setup-room" class="input-setup" placeholder="Code Salle (ex: 1234)">
            <input type="text" id="setup-logo" class="input-setup" placeholder="URL Logo (Facultatif)">
            <input type="text" id="setup-link" class="input-setup" placeholder="Lien Site Web (Facultatif)">
            <button class="btn btn-green" onclick="createRoom()">OUVRIR LA SALLE</button>
        </div>
    </div>

    <div id="qr-modal" onclick="this.style.display='none'">
        <div class="qr-content" onclick="event.stopPropagation()">
            <div id="qrcode"></div>
            <h2 id="qr-text" style="color:#2c3e50; margin-bottom:0;"></h2>
        </div>
    </div>

    <header>
        <div class="header-title">
            <img id="mj-logo-img" src="" style="display:none;">
            <div>
                <h1>ESPACE ANIMATEUR</h1>
                <div style="font-size:0.8rem; color:#bdc3c7;">Connecté en tant que : <span id="mj-name-display" style="color:white; font-weight:bold;">...</span></div>
            </div>
        </div>
        <div class="room-display" onclick="showQR()">
            SALLE : <span id="room-code-display">----</span> 🔗
        </div>
    </header>

    <div class="main-container">
        <div class="left-panel">
            
            <div class="control-card">
                <h3>ÉTAT DU BUZZER</h3>
                <div id="status-box" class="state-display blocked">BLOQUÉ</div>
                <button class="btn btn-green" onclick="setGameState('ready')">🟢 LIBÉRER (BUZZ)</button>
                <button class="btn btn-red" onclick="setGameState('blocked')">🔴 BLOQUER</button>
                <button class="btn btn-orange" onclick="resetBuzz()">🔄 RESET MANCHE</button>
            </div>

            <div class="control-card">
                <h3>AFFICHAGE</h3>
                <button class="btn btn-blue" onclick="openScores()">📊 ÉCRAN SCORES</button>
                <button class="btn btn-blue" onclick="triggerPodium()">🏆 LANCER PODIUM</button>
            </div>

            <div class="control-card">
                <h3>GESTION</h3>
                <button class="btn btn-grey" onclick="cleanInactive()">🧹 Nettoyer Inactifs</button>
                <button class="btn btn-red" onclick="deleteRoom()">❌ FERMER SALLE</button>
            </div>

            <div class="control-card" style="border-color:#f39c12;">
                <h3 style="color:#f39c12;">ADMIN VERSION</h3>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="sys-version-input" style="width:100%; padding:5px; border-radius:4px; border:none;" placeholder="1.xxx">
                    <button class="btn-mini btn-grey" onclick="updateVersion()" style="width:auto; white-space:nowrap;">Mettre à jour</button>
                </div>
                <div style="font-size:0.7rem; color:#aaa; margin-top:5px;">Actuelle: <span id="current-version-display">...</span></div>
            </div>

        </div>

        <div class="right-panel">
            <div class="tabs">
                <div id="tab-players" class="tab active" onclick="switchTab('players')">JOUEURS (<span id="count-players">0</span>)</div>
                <div id="tab-teams" class="tab" onclick="switchTab('teams')">ÉQUIPES (<span id="count-teams">0</span>)</div>
            </div>

            <div id="list-players" class="grid-players"></div>
            <div id="list-teams" class="grid-players" style="display:none;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAf1Vl_O8SHJeFjHavKBJgUFGGy73I8t-o",
            authDomain: "prestapuce-buzz.firebaseapp.com",
            databaseURL: "https://prestapuce-buzz-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "prestapuce-buzz",
            storageBucket: "prestapuce-buzz.firebasestorage.app",
            messagingSenderId: "907270883505",
            appId: "1:907270883505:web:197efec0b99db28180ba90"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomID = null;
        let roomRef = null;
        let currentTab = 'players';

        // --- INIT ---
        function createRoom() {
            const mj = document.getElementById('setup-mj').value.trim();
            const code = document.getElementById('setup-room').value.trim();
            const logo = document.getElementById('setup-logo').value.trim();
            const link = document.getElementById('setup-link').value.trim();

            if (!mj || !code) return alert("Nom et Code obligatoires.");

            roomID = code;
            roomRef = db.ref('rooms/' + roomID);

            // Mise à jour des infos de la salle
            roomRef.update({
                mjName: mj,
                mjLogo: logo,
                mjLink: link,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            });

            // Enregistrement dans la liste des salles actives (pour que le joueur la trouve)
            db.ref('activeRooms/' + roomID).set({
                mj: mj,
                started: Date.now()
            });

            // UI
            document.getElementById('setup-modal').style.display = 'none';
            document.getElementById('mj-name-display').innerText = mj;
            document.getElementById('room-code-display').innerText = roomID;
            if(logo) {
                document.getElementById('mj-logo-img').src = logo;
                document.getElementById('mj-logo-img').style.display = 'block';
            }

            listenRoom();
            listenConfig(); // Ajout v1.104
        }

        // --- LISTENERS ---
        function listenRoom() {
            // Game State
            roomRef.child('gameState').on('value', snap => {
                const state = snap.val() ? snap.val().status : 'waiting';
                const box = document.getElementById('status-box');
                box.className = 'state-display ' + state;
                if(state === 'ready') box.innerText = "BUZZER OUVERT !";
                else if(state === 'blocked') box.innerText = "BLOQUÉ";
                else if(state === 'taken') box.innerText = "BUZZÉ !";
                else box.innerText = "EN ATTENTE";
            });

            // Players
            roomRef.child('players').on('value', snap => {
                renderPlayers(snap.val() || {});
            });

            // Teams
            roomRef.child('teams').on('value', snap => {
                renderTeams(snap.val() || {});
            });

            // Buzzers (Highlighter celui qui buzze)
            roomRef.child('buzzers').on('value', snap => {
                highlightBuzzer(snap.val());
            });
        }

        // --- GESTION VERSION (v1.104) ---
        function listenConfig() {
            db.ref('config/minVersion').on('value', snap => {
                const v = snap.val() || "?.???";
                document.getElementById('current-version-display').innerText = v;
                // Si l'input est vide, on met la version courante
                if(document.getElementById('sys-version-input').value === "") {
                    document.getElementById('sys-version-input').value = v;
                }
            });
        }

        function updateVersion() {
            const v = document.getElementById('sys-version-input').value;
            if(confirm("Confirmer la mise à jour forcée vers la version " + v + " ?")) {
                db.ref('config/minVersion').set(v);
            }
        }

        // --- RENDERING ---
        function renderPlayers(players) {
            const list = document.getElementById('list-players');
            list.innerHTML = "";
            const keys = Object.keys(players);
            document.getElementById('count-players').innerText = keys.length;

            // Trier : Actifs d'abord, puis par score
            const sorted = keys.map(k => ({uid: k, ...players[k]})).sort((a,b) => {
                if(a.active !== b.active) return b.active ? 1 : -1;
                return b.pts - a.pts;
            });

            sorted.forEach(p => {
                const isActive = p.active !== false;
                const isBanned = p.banned === true;
                const div = document.createElement('div');
                div.className = `player-card ${isActive ? 'active' : 'inactive'}`;
                div.id = `card-${p.uid}`; // ID pour l'effet buzz
                
                div.innerHTML = `
                    <div style="display:flex; align-items:center; overflow:hidden;">
                        <img src="${p.avatar || ''}" class="p-avatar" onerror="this.style.display='none'">
                        <div class="p-info">
                            <div class="p-name" style="${isBanned ? 'text-decoration:line-through; color:red;' : ''}">${p.name}</div>
                            <div class="p-team">${p.teamName !== 'Solo' ? p.teamName : 'Solo'}</div>
                        </div>
                    </div>
                    <div class="p-actions">
                        <div class="score-badge">${p.pts || 0}</div>
                        <button class="btn-mini btn-green" onclick="updateScore('${p.uid}', 1)">+</button>
                        <button class="btn-mini btn-red" onclick="updateScore('${p.uid}', -1)">-</button>
                        <button class="btn-mini btn-grey" onclick="toggleBan('${p.uid}', ${isBanned})">${isBanned ? '🔓' : '🚫'}</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function renderTeams(teams) {
            const list = document.getElementById('list-teams');
            list.innerHTML = "";
            const keys = Object.keys(teams);
            document.getElementById('count-teams').innerText = keys.length;

            keys.forEach(k => {
                const t = teams[k];
                const div = document.createElement('div');
                div.className = 'player-card active'; // Reuse style
                div.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <img src="${t.icon || ''}" class="p-avatar">
                        <div class="p-info">
                            <div class="p-name">${k}</div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function highlightBuzzer(val) {
            // Reset visuals
            document.querySelectorAll('.player-card').forEach(e => e.classList.remove('buzzed'));
            
            if (val && val.id) {
                // Si on a un ID joueur (mode solo ou team)
                const card = document.getElementById('card-' + val.id);
                if(card) {
                    card.classList.add('buzzed');
                    card.scrollIntoView({behavior: "smooth", block: "center"});
                }
                
                // Jouer un son (Optionnel, à voir plus tard)
            }
        }

        // --- ACTIONS ---
        function setGameState(status) {
            roomRef.child('gameState').update({ status: status });
            if(status === 'ready') {
                // On vide le buzzer quand on ouvre
                roomRef.child('buzzers').remove();
            }
        }

        function resetBuzz() {
            roomRef.child('gameState').update({ status: 'waiting' });
            roomRef.child('buzzers').remove();
        }

        function updateScore(uid, val) {
            roomRef.child('players/' + uid + '/pts').transaction(pts => (pts || 0) + val);
        }

        function toggleBan(uid, currentStatus) {
            roomRef.child('players/' + uid).update({ banned: !currentStatus, active: false });
        }

        function cleanInactive() {
            if(confirm("Supprimer tous les joueurs inactifs ?")) {
                roomRef.child('players').once('value', snap => {
                    snap.forEach(child => {
                        if(child.val().active === false) {
                            child.ref.remove();
                        }
                    });
                });
            }
        }

        function deleteRoom() {
            if(confirm("ATTENTION: Cela supprimera la salle et tous les scores. Continuer ?")) {
                roomRef.remove();
                db.ref('activeRooms/' + roomID).remove();
                location.reload();
            }
        }

        function openScores() {
            window.open('scores.html?room=' + roomID, '_blank');
        }
        
        function triggerPodium() {
            if(confirm("Afficher le podium sur l'écran des scores ? (Cela met fin à la partie)")) {
                roomRef.child('gameState').update({ status: 'endGame' });
            }
        }

        // --- UI ---
        function switchTab(target) {
            currentTab = target;
            document.getElementById('tab-players').className = target === 'players' ? 'tab active' : 'tab';
            document.getElementById('tab-teams').className = target === 'teams' ? 'tab active' : 'tab';
            
            document.getElementById('list-players').style.display = target === 'players' ? 'grid' : 'none';
            document.getElementById('list-teams').style.display = target === 'teams' ? 'grid' : 'none';
        }

        function showQR() {
            const url = window.location.href.replace('mj.html', 'index.html') + "?room=" + roomID;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: url, width: 250, height: 250 });
            document.getElementById('qr-text').innerText = "Salle : " + roomID;
            document.getElementById('qr-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
