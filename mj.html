<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Console MJ Pro - Presta'Puce (v1.100)</title>
    <link rel="icon" id="page-favicon" type="image/png" href="https://static.wixstatic.com/media/eda9e4_e7ab6af2d5a7428f9bc7e4af454e20ef~mv2.png">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --mj-color: #2ecc71; --bg-color: #1a1a1a; --card-bg: #2c3e50; --text-color: #ffffff; --danger: #e74c3c; --accent: #f1c40f; --blue: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        
        /* Layout */
        .header { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-bottom: 3px solid var(--mj-color); }
        .room-code { font-size: 2.5rem; font-weight: bold; color: var(--mj-color); letter-spacing: 3px; font-family: monospace; }
        
        /* Grid Joueurs */
        .grid-players { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .player-card { background: var(--card-bg); padding: 15px; border-radius: 10px; text-align: center; position: relative; border: 2px solid transparent; transition: 0.3s; }
        .player-card.buzzed { border-color: var(--accent); background: #34495e; transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }
        .player-avatar { font-size: 2.5rem; display: block; margin-bottom: 5px; }
        .player-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .player-score { font-size: 1.5rem; color: var(--accent); font-weight: bold; }
        
        /* Contrôles Joueur */
        .controls { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
        .btn-mini { padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-plus { background: var(--blue); }
        .btn-minus { background: #7f8c8d; }
        .btn-ban { background: var(--danger); }
        
        /* Zone Buzzer Actif */
        #active-buzzer-zone { background: var(--accent); color: #000; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; display: none; animation: popIn 0.3s; }
        .big-avatar { font-size: 4rem; }
        .big-name { font-size: 2rem; font-weight: bold; }
        
        /* Actions Globales */
        .global-actions { margin-bottom: 20px; display: flex; gap: 10px; }
        .btn-main { padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; flex: 1; }
        .btn-unlock { background: var(--mj-color); }
        .btn-reset { background: var(--danger); }
        .btn-save { background: var(--blue); }

        /* QR Code */
        #qrcode { background: white; padding: 10px; border-radius: 5px; }

        /* Liste Bannis */
        .banned-section { margin-top: 40px; border-top: 1px solid #555; padding-top: 20px; opacity: 0.6; }
        .banned-list { list-style: none; padding: 0; }
        .banned-item { display: inline-block; background: #333; padding: 5px 10px; margin: 5px; border-radius: 5px; font-size: 0.9rem; }
        .unban-btn { margin-left: 10px; cursor: pointer; color: var(--mj-color); }

        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div style="font-size:0.9rem; color:#aaa;">CODE SALLE</div>
        <div class="room-code" id="display-room-code">----</div>
    </div>
    <div id="qrcode"></div>
</div>

<div id="active-buzzer-zone">
    <div class="big-avatar" id="buzzer-avatar">🔔</div>
    <div class="big-name" id="buzzer-name">JOUEUR</div>
    <div style="margin-top:10px;">A BUZZÉ !</div>
</div>

<div class="global-actions">
    <button class="btn-main btn-unlock" onclick="unlockBuzzers()">🔓 DÉVERROUILLER</button>
    <button class="btn-main btn-reset" onclick="resetScores()">0️⃣ RESET SCORES</button>
    <button class="btn-main btn-save" onclick="saveAndQuit()">💾 SAUVER & QUITTER</button>
</div>

<h3 style="border-bottom: 1px solid #555; padding-bottom: 10px;">Joueurs Actifs (<span id="count-players">0</span>)</h3>
<div class="grid-players" id="players-container">
    </div>

<div class="banned-section" id="banned-section" style="display:none;">
    <h4>Joueurs Exclus / Bannis</h4>
    <ul class="banned-list" id="banned-list"></ul>
</div>

<script>
    // Configuration Firebase (Identique Index)
    const firebaseConfig = {
        apiKey: "AIzaSyD...",
        authDomain: "presta-puce.firebaseapp.com",
        databaseURL: "https://presta-puce-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "presta-puce",
        storageBucket: "presta-puce.appspot.com",
        messagingSenderId: "53826...",
        appId: "1:5382..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let roomID = localStorage.getItem('buzz_mj_roomCode');
    let roomRef = null;

    // --- INITIALISATION ---
    function init() {
        if (!roomID) {
            // Création nouvelle salle si aucune en cache
            createNewRoom();
        } else {
            // Vérifier si la salle existe encore
            db.ref('activeRooms/' + roomID).once('value', snap => {
                if (snap.exists()) {
                    setupRoom(roomID);
                } else {
                    createNewRoom();
                }
            });
        }
    }

    function createNewRoom() {
        roomID = Math.random().toString(36).substring(2, 6).toUpperCase();
        localStorage.setItem('buzz_mj_roomCode', roomID);
        
        // Création dans Firebase
        db.ref('activeRooms/' + roomID).set({
            createdAt: Date.now(),
            mj: "host"
        });
        
        db.ref('rooms/' + roomID).set({
            state: 'locked', // Démarre verrouillé
            podium: false
        }).then(() => {
            setupRoom(roomID);
        });
    }

    function setupRoom(code) {
        document.getElementById('display-room-code').innerText = code;
        roomRef = db.ref('rooms/' + code);
        
        // Générer QR Code
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: "https://presta-puce.firebaseapp.com/?room=" + code,
            width: 64,
            height: 64
        });

        // Écouter les Joueurs (Nouvelle logique UserID)
        roomRef.child('players').on('value', renderPlayers);

        // Écouter le Buzzer (Qui a buzzé ?)
        roomRef.child('buzzer').on('value', snap => {
            const buzzerData = snap.val();
            const zone = document.getElementById('active-buzzer-zone');
            
            if (buzzerData) {
                // Afficher le gros bloc
                zone.style.display = 'block';
                document.getElementById('buzzer-avatar').innerText = buzzerData.avatar;
                document.getElementById('buzzer-name').innerText = buzzerData.name;
                
                // Jouer son (optionnel)
                // highlightPlayer(buzzerData.id);
            } else {
                zone.style.display = 'none';
            }
        });
    }

    // --- RENDU DES JOUEURS (Cœur de la v1.100) ---
    function renderPlayers(snapshot) {
        const container = document.getElementById('players-container');
        const bannedList = document.getElementById('banned-list');
        const bannedSection = document.getElementById('banned-section');
        
        container.innerHTML = "";
        bannedList.innerHTML = "";
        
        const players = snapshot.val() || {};
        let count = 0;
        let hasBanned = false;

        // On boucle sur les USER IDs (clés)
        Object.keys(players).forEach(userId => {
            const p = players[userId];
            
            // Si joueur BANNI
            if (p.banned === true) {
                hasBanned = true;
                const li = document.createElement('li');
                li.className = 'banned-item';
                li.innerHTML = `${p.avatar} ${p.name} <span class="unban-btn" onclick="unbanPlayer('${userId}')">♻️</span>`;
                bannedList.appendChild(li);
                return; // On ne l'affiche pas dans la grille
            }

            // Si joueur ACTIF
            if (p.active !== false) { // On affiche même ceux qui ont quitté momentanément, sauf si on veut filtrer strict
                count++;
                const isBuzzed = p.buzzed === true ? 'buzzed' : '';
                
                const card = document.createElement('div');
                card.className = `player-card ${isBuzzed}`;
                card.id = `card-${userId}`;
                
                card.innerHTML = `
                    <span class="player-avatar">${p.avatar}</span>
                    <div class="player-name">${p.name}</div>
                    <div class="player-score">${p.score}</div>
                    <div class="controls">
                        <button class="btn-mini btn-minus" onclick="updateScore('${userId}', -1)">-1</button>
                        <button class="btn-mini btn-plus" onclick="updateScore('${userId}', 1)">+1</button>
                    </div>
                    <div class="controls" style="margin-top:5px;">
                         <button class="btn-mini btn-ban" onclick="banPlayer('${userId}', '${p.name}')">🗑️</button>
                    </div>
                `;
                container.appendChild(card);
            }
        });

        document.getElementById('count-players').innerText = count;
        bannedSection.style.display = hasBanned ? 'block' : 'none';
    }

    // --- ACTIONS MJ ---

    // 1. Gestion Score (Sur UserID)
    window.updateScore = function(userId, delta) {
        // Transaction atomique pour éviter les conflits
        db.ref(`rooms/${roomID}/players/${userId}/score`).transaction(currentScore => {
            return (currentScore || 0) + delta;
        });
    };

    // 2. Bannissement (Flag Banned)
    window.banPlayer = function(userId, name) {
        if(confirm(`Bannir définitivement ${name} de cette salle ?`)) {
            db.ref(`rooms/${roomID}/players/${userId}`).update({
                banned: true,
                active: false,
                buzzed: false
            });
        }
    };

    window.unbanPlayer = function(userId) {
        if(confirm(`Autoriser ce joueur à revenir ?`)) {
            db.ref(`rooms/${roomID}/players/${userId}`).update({
                banned: false
            });
        }
    };

    // 3. Déverrouiller (Reset Buzzers)
    window.unlockBuzzers = function() {
        // Reset état salle
        roomRef.update({ state: 'open', buzzer: null });
        
        // Reset buzzers individuels
        roomRef.child('players').once('value', snap => {
            const players = snap.val() || {};
            const updates = {};
            Object.keys(players).forEach(uid => {
                if(players[uid].buzzed) {
                    updates[uid + '/buzzed'] = false;
                }
            });
            if(Object.keys(updates).length > 0) {
                roomRef.child('players').update(updates);
            }
        });
    };

    // 4. Reset Scores (Garde les joueurs, met scores à 0)
    window.resetScores = function() {
        if(confirm("Remettre tous les scores à ZÉRO ?")) {
             roomRef.child('players').once('value', snap => {
                const players = snap.val() || {};
                const updates = {};
                Object.keys(players).forEach(uid => {
                    updates[uid + '/score'] = 0;
                    updates[uid + '/buzzed'] = false;
                });
                roomRef.child('players').update(updates);
                roomRef.update({ state: 'locked', buzzer: null, podium: false });
            });
        }
    };

    // 5. Sauver et Quitter (Ferme la salle pour les joueurs)
    window.saveAndQuit = function() {
        if(confirm("Fermer la salle ? Les joueurs seront déconnectés.")) {
            // Supprimer la référence 'activeRooms' pour que les joueurs ne puissent plus entrer
            db.ref('activeRooms/' + roomID).remove();
            
            // On peut garder 'rooms/CODE' si on veut restaurer plus tard, 
            // ou tout supprimer. Ici on garde pour l'historique UserID.
            
            localStorage.removeItem('buzz_mj_roomCode');
            alert("Salle fermée.");
            location.reload();
        }
    };

    // Lancer
    init();

</script>
</body>
</html>
