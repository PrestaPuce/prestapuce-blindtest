<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote MJ v1.151 - Presta'Puce</title>
    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/eda9e4_e7ab6af2d5a7428f9bc7e4af454e20ef~mv2.png">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --mj-color: #2ecc71; --bg-color: #1a1a1a; --card-bg: #2c3e50; --text-color: #ffffff; --danger: #e74c3c; --accent: #f1c40f; --blue: #3498db; --gold: #f39c12; }
        body { background: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }
        
        #screen-login { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 20px; background: var(--bg-color); z-index: 100; position: absolute; width: 100%; box-sizing: border-box; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #555; background: #333; color: white; font-size: 1.1rem; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 15px; background: var(--mj-color); border: none; border-radius: 8px; color: white; font-size: 1.2rem; font-weight: bold; }

        .top-bar { height: 40px; background: black; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; font-size: 0.8rem; border-bottom: 1px solid #333; flex-shrink: 0; }
        
        .player-zone { flex: 0 0 auto; height: 25vh; min-height: 140px; background: var(--card-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 2px solid var(--accent); padding: 10px; position: relative; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; background: #333; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin-bottom: 5px; border: 2px solid white; }
        .p-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; color: white; text-align: center; }
        
        .quick-actions { display: flex; gap: 15px; margin-top: 5px; }
        .mini-btn { width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 4px rgba(0,0,0,0.3); cursor: pointer; color: white; }
        .mini-btn:active { transform: scale(0.95); }

        .controls-zone { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 8px; background: #111; overflow-y: auto; }
        .big-btn { width: 100%; flex: 1; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 800; color: white; text-transform: uppercase; box-shadow: 0 3px 0 rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; min-height: 45px; cursor: pointer; transition: 0.1s; }
        .big-btn:active { transform: translateY(3px); box-shadow: none; }
        .big-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .btn-open { background: var(--blue); }
        .btn-open.active { background: var(--mj-color); }
        .btn-gold { background: var(--gold); color: black; }
        .btn-green { background: var(--mj-color); }
        .btn-error { background: var(--danger); }
        .btn-reset { background: #34495e; color: #ccc; font-size: 0.9rem; flex: 0 0 40px; min-height: 40px; }

        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .st-waiting { background: #555; }
        .st-ready { background: var(--mj-color); }
        .st-buzzed { background: var(--accent); color: black; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .version-tag { position: fixed; bottom: 5px; right: 5px; font-size: 10px; color: #444; pointer-events: none; }
    </style>
</head>
<body>

    <div id="screen-login">
        <h2 style="color:var(--mj-color); margin-bottom: 20px;">Remote MJ</h2>
        <input type="text" id="room-id" placeholder="ID de la Salle" value="DEMO">
        <button class="btn-login" onclick="connect()">SE CONNECTER</button>
    </div>

    <div class="top-bar">
        <span id="display-room-id">SALLE: ---</span>
        <div id="main-status" class="status-pill st-waiting">HORS LIGNE</div>
    </div>

    <div class="player-zone">
        <div id="player-avatar" class="avatar">❓</div>
        <div id="player-name" class="p-name">EN ATTENTE...</div>
        <div id="player-score" style="font-size: 1.5rem; font-weight: 900; color: var(--gold);">0 pts</div>
        
        <div class="quick-actions">
            <button class="mini-btn btn-error" onclick="warnPlayer()" title="Avertir">⚠️</button>
            <button id="btn-kick" class="mini-btn" style="background:#555;" onclick="kickPlayer()" disabled title="Bannir">🚫</button>
            <button class="mini-btn btn-blue" onclick="toggleBlock()" id="btn-block">🔓</button>
        </div>
    </div>

    <div class="controls-zone">
        <button id="btn-open-buzz" class="big-btn btn-open" onclick="statusUpdate('ready')">OUVRIR LES BUZZERS</button>
        
        <div style="display:flex; gap:8px; flex:1;">
            <button class="big-btn btn-gold" onclick="handleReward(1, 'full')">+1 PT</button>
            <button class="big-btn btn-gold" onclick="handleReward(2, 'full')">+2 PTS</button>
        </div>

        <div style="display:flex; gap:8px; flex:1;">
            <button class="big-btn btn-green" onclick="handleReward(1, 'partial')">JUSTE (+1)</button>
            <button class="big-btn btn-error" onclick="handleError()">FAUX (BLOC)</button>
        </div>

        <div style="display:flex; gap:8px; flex: 0 0 50px;">
            <button class="big-btn" style="background:#444; flex:1;" onclick="adj(-1)">-1</button>
            <button class="big-btn btn-reset" onclick="fullReset()">RESET GLOBAL</button>
            <button class="big-btn" style="background:#444; flex:1;" onclick="adj(1)">+1</button>
        </div>
    </div>

    <div class="version-tag">v1.151</div>

    <script>
        const firebaseConfig = { databaseURL: "https://prestapuce-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let roomID = "";
        let roomRef = null;
        let currentPlayer = null; 
        let currentBlocked = {};
        let allPlayersData = {};

        function connect() {
            roomID = document.getElementById('room-id').value.trim().toUpperCase();
            if(!roomID) return;
            
            roomRef = db.ref('rooms/' + roomID);
            document.getElementById('display-room-id').innerText = "SALLE: " + roomID;
            document.getElementById('screen-login').style.display = 'none';

            // Sync État Salle
            roomRef.child('gameState').on('value', s => {
                const st = s.val() || 'waiting';
                const pill = document.getElementById('main-status');
                const btnOpen = document.getElementById('btn-open-buzz');
                
                pill.className = "status-pill st-" + st;
                pill.innerText = st.toUpperCase();

                if(st === 'ready') {
                    btnOpen.innerText = "✅ BUZZERS OUVERTS";
                    btnOpen.classList.add('active');
                    btnOpen.disabled = true;
                } else {
                    btnOpen.innerText = "OUVRIR LES BUZZERS";
                    btnOpen.classList.remove('active');
                    btnOpen.disabled = false;
                }
            });

            // Sync Joueurs pour les scores et sanctions
            roomRef.child('players').on('value', s => {
                allPlayersData = s.val() || {};
                if(currentPlayer) updatePlayerUI();
            });

            // Sync Buzzer Actif
            roomRef.child('buzzers').on('value', s => {
                const buzzers = s.val();
                if(buzzers) {
                    const uid = Object.keys(buzzers)[0];
                    const pData = allPlayersData[uid];
                    if(pData) {
                        currentPlayer = { ...pData, uid: uid };
                        updatePlayerUI();
                    }
                } else {
                    // On ne reset pas currentPlayer pour permettre de donner les points 
                    // après que le buzzer ait disparu visuellement
                }
            });

            roomRef.child('blockedPlayers').on('value', s => {
                currentBlocked = s.val() || {};
                updateBlockUI();
            });
        }

        function updatePlayerUI() {
            if(!currentPlayer) return;
            const data = allPlayersData[currentPlayer.uid] || currentPlayer;
            
            document.getElementById('player-name').innerText = data.name || "Inconnu";
            document.getElementById('player-score').innerText = (data.points || 0) + " pts";
            
            const av = document.getElementById('player-avatar');
            if(data.avatar && data.avatar.length > 20) {
                av.innerHTML = `<img src="${data.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
            } else {
                av.innerHTML = data.avatar || "👤";
            }

            // Gestion des boutons de sanction
            const btnKick = document.getElementById('btn-kick');
            if(data.warned) {
                btnKick.disabled = false;
                btnKick.style.background = "var(--danger)";
            } else {
                btnKick.disabled = true;
                btnKick.style.background = "#555";
            }
            updateBlockUI();
        }

        function updateBlockUI() {
            const btn = document.getElementById('btn-block');
            if(!currentPlayer) return;
            const isBlocked = currentBlocked[currentPlayer.name];
            btn.innerText = isBlocked ? "🔒" : "🔓";
            btn.style.background = isBlocked ? "var(--danger)" : "var(--blue)";
        }

        function statusUpdate(st) { 
            roomRef.child('gameState').set(st); 
            if(st === 'ready') roomRef.child('buzzers').remove(); 
        }

        function fullReset() { 
            roomRef.child('blockedPlayers').remove(); 
            roomRef.child('buzzers').remove(); 
            statusUpdate('waiting'); 
        }

        function handleReward(pts, mode) {
            if(!currentPlayer) return;
            const newScore = (allPlayersData[currentPlayer.uid]?.points || 0) + pts;
            roomRef.child('players/' + currentPlayer.uid).update({ points: newScore });

            if(mode === 'partial') {
                roomRef.child('blockedPlayers/' + currentPlayer.name).set(true);
                statusUpdate('ready');
            } else fullReset();
        }

        function handleError() {
            if(!currentPlayer) return;
            roomRef.child('blockedPlayers/' + currentPlayer.name).set(true);
            statusUpdate('ready');
        }

        function toggleBlock() {
            if(!currentPlayer) return;
            const p = currentPlayer.name;
            if(currentBlocked[p]) roomRef.child('blockedPlayers/' + p).remove();
            else roomRef.child('blockedPlayers/' + p).set(true);
        }

        function adj(v) { 
            if(!currentPlayer) return;
            const newScore = (allPlayersData[currentPlayer.uid]?.points || 0) + v;
            roomRef.child('players/' + currentPlayer.uid).update({ points: newScore });
        }

        function warnPlayer() {
            if(!currentPlayer) return;
            roomRef.child('players/' + currentPlayer.uid).update({ warned: true });
        }

        function kickPlayer() {
            if(!currentPlayer) return;
            if(confirm("Bannir définitivement " + currentPlayer.name + " ?")) {
                roomRef.child('players/' + currentPlayer.uid).update({ kicked: true });
            }
        }
    </script>
</body>
</html>
